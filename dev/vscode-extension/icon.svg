<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a1a" stroke="#00ff00" stroke-width="3"/>
  
  <!-- Diamond/crystal shape representing uDOS -->
  <polygon points="64,20 90,45 64,70 38,45" fill="#00ff00" opacity="0.8"/>
  <polygon points="64,70 90,45 64,95 38,70" fill="#00cc00" opacity="0.6"/>
  
  <!-- Terminal/console lines -->
  <rect x="25" y="85" width="20" height="2" fill="#00ff00" rx="1"/>
  <rect x="25" y="90" width="15" height="2" fill="#00cc00" rx="1"/>
  <rect x="25" y="95" width="25" height="2" fill="#00ff00" rx="1"/>
  
  <!-- Small "u" representing uDOS -->
  <text x="52" y="115" font-family="Monaco, monospace" font-size="18" fill="#00ff00" font-weight="bold">u</text>
  <text x="68" y="115" font-family="Monaco, monospace" font-size="18" fill="#00cc00" font-weight="bold">DOS</text>
</svg>
