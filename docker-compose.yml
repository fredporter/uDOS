services:
  uos:
    build: .
    container_name: uos-container
    stdin_open: true       # Enables interactive input (STDIN)
    tty: true              # Allocates a pseudo-TTY
    volumes:
      - .:/uOS                   # Mount entire uOS repo
      - ./scripts:/uOS/scripts  # CLI and backend logic
      - ./uMemory:/uMemory      # Private local memory (ignored in Git)
      - ./uKnowledge:/uKnowledge  # Public shared knowledge
    working_dir: /uOS
    command: ["bash", "scripts/uCode.sh"]