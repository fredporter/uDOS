# uDOS Service Stack — Snap-on-off containerised architecture
# Usage: docker compose up --build
# Profiles:
#   docker compose up                       # wizard only (default)
#   docker compose --profile scheduler up   # + mission scheduler
#   docker compose --profile homeassistant up # + home assistant
#   docker compose --profile groovebox up   # + groovebox/songscribe
#   docker compose --profile all up         # everything

services:
  wizard:
    build: .
    restart: unless-stopped
    ports:
      - "8765:8765"
    volumes:
      - ./:/app
    environment:
      - UDOS_ROOT=/app
      - UDOS_ROOT_REQUIRED=1
      - VAULT_ROOT=/app/memory/vault
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  mission-scheduler:
    build: ./node/mission-scheduler
    restart: unless-stopped
    profiles:
      - scheduler
      - all
    environment:
      - WIZARD_RENDER_URL=http://wizard:8765/api/renderer/render
      - WIZARD_API_BASE=http://wizard:8765
      - UDOS_ROOT=/app
      - UDOS_ROOT_REQUIRED=1
      - VAULT_ROOT=/app/memory/vault
      - INTERVAL_SECONDS=30
    volumes:
      - ./:/app
    depends_on:
      wizard:
        condition: service_healthy

  home-assistant:
    build: ./library/home-assistant
    restart: unless-stopped
    profiles:
      - homeassistant
      - all
    ports:
      - "8123:8123"
    volumes:
      - ha_config:/config
    depends_on:
      wizard:
        condition: service_healthy

  groovebox:
    build:
      context: ./library/songscribe
      dockerfile: Dockerfile
    restart: unless-stopped
    profiles:
      - groovebox
      - all
    volumes:
      - ./:/app
    depends_on:
      wizard:
        condition: service_healthy

volumes:
  ha_config:
