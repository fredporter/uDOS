services:
  udos:
    build: .
    container_name: udos-container
    volumes:
      - .:/uDOS
      - ./uMemory:/uMemory
      - ./uKnowledge:/uKnowledge
      - ./scripts:/uDOS/scripts
    working_dir: /uDOS
    stdin_open: true
    tty: true
    environment:
      - UDOS_KNOWLEDGE_DIR=/uKnowledge
      - UDOS_MEMORY_DIR=/uMemory
      - UDOS_CONFIG_DIR=/config
    command: ["bash", "scripts/launch-uDOS.sh"]  # ✅ the key fix
