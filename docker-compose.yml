services:
  udos:
    build: .
    container_name: udos-container
    volumes:
      - .:/root/uDOS
      - ./uMemory:/uMemory
      - ./uKnowledge:/uKnowledge
      - ./scripts:/root/uDOS/scripts
    working_dir: /root/uDOS
    stdin_open: true
    tty: true
    environment:
      - UDOS_KNOWLEDGE_DIR=/uKnowledge
      - UDOS_MEMORY_DIR=/uMemory
      - UDOS_CONFIG_DIR=/config
    command: ["bash", "/root/uDOS/scripts/start.sh"]
