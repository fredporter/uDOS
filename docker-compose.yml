services:
  udos:
    build: .
    container_name: udos-container
    volumes:
      - .:/uDOS
      - ./uMemory:/uDOS/uMemory
      - ./uKnowledge:/uDOS/uKnowledge
      - ./uCode:/uDOS/uCode
    working_dir: /uDOS
    stdin_open: true
    tty: true
    environment:
      - UDOS_KNOWLEDGE_DIR=/uDOS/uKnowledge
      - UDOS_MEMORY_DIR=/uDOS/uMemory
      - UDOS_CONFIG_DIR=/uDOS/config
    command: ["bash", "/uDOS/uCode/uCode.sh"]
