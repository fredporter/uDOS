version: "3.8"

services:
  uos:
    build: .
    container_name: uos-container
    volumes:
      - .:/uOS
      - ./uMemory:/uMemory
      - ./uKnowledge:/uKnowledge
      - ./scripts:/uOS/scripts
    working_dir: /uOS
    stdin_open: true
    tty: true
    environment:
      - UOS_KNOWLEDGE_DIR=/uKnowledge
      - UOS_MEMORY_DIR=/uMemory
      - UOS_CONFIG_DIR=/config
    command: ["bash", "scripts/uCode.sh"]
