[pytest]
# uDOS Test Configuration
# Version: 1.1.8+

# Python path configuration
pythonpath = .

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --color=yes
    -ra

# Markers for test organization
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (may require services)
    slow: Slow tests (may take >5 seconds)
    api: Tests requiring API keys
    smoke: Smoke tests for quick validation

# Ignore patterns
testpaths = sandbox/tests
norecursedirs = .git .venv __pycache__ *.egg-info

# Coverage (if pytest-cov installed)
# addopts = --cov=core --cov=extensions --cov-report=html

# Timeout (if pytest-timeout installed)
# timeout = 300

# Log CLI output during tests
log_cli = false
log_cli_level = WARNING
