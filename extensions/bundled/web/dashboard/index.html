<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uDOS System Dashboard</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
        }
        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #0f0;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            border: 1px solid #0f0;
            padding: 15px;
            background-color: #001100;
        }
        .card h3 {
            margin-top: 0;
            color: #0f0;
        }
        .metric {
            display: flex;
            justify-content: space-between;
            margin: 5px 0;
        }
        .status-ok { color: #0f0; }
        .status-warning { color: #ff0; }
        .status-error { color: #f00; }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1>uDOS System Dashboard</h1>
            <p>Real-time system monitoring and control</p>
        </div>

        <div class="grid">
            <div class="card">
                <h3>System Resources</h3>
                <div class="metric">
                    <span>CPU:</span>
                    <span id="cpu-usage" class="status-ok">--%</span>
                </div>
                <div class="metric">
                    <span>Memory:</span>
                    <span id="memory-usage" class="status-ok">--%</span>
                </div>
                <div class="metric">
                    <span>Disk:</span>
                    <span id="disk-usage" class="status-ok">--%</span>
                </div>
            </div>

            <div class="card">
                <h3>API Quotas</h3>
                <div class="metric">
                    <span>Gemini:</span>
                    <span id="gemini-quota" class="status-ok">--/--</span>
                </div>
                <div class="metric">
                    <span>GitHub:</span>
                    <span id="github-quota" class="status-ok">--/--</span>
                </div>
            </div>

            <div class="card">
                <h3>Active Missions</h3>
                <div id="missions-list">
                    <p>No active missions</p>
                </div>
            </div>

            <div class="card">
                <h3>Scheduled Tasks</h3>
                <div id="schedule-list">
                    <p>No scheduled tasks</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fetch system data from uDOS API
        async function updateDashboard() {
            try {
                const response = await fetch('/api/resources');
                const data = await response.json();

                if (data.success) {
                    updateResources(data.resources);
                }
            } catch (error) {
                console.error('Failed to fetch dashboard data:', error);
            }
        }

        function updateResources(resources) {
            // Update system resources
            if (resources.system) {
                document.getElementById('cpu-usage').textContent = resources.system.cpu_percent + '%';
                document.getElementById('memory-usage').textContent = resources.system.memory_percent + '%';
            }

            // Update disk usage
            if (resources.disk) {
                const diskPercent = Math.round(resources.disk.percent);
                document.getElementById('disk-usage').textContent = diskPercent + '%';
            }

            // Update API quotas
            if (resources.api_quotas) {
                if (resources.api_quotas.gemini) {
                    const gemini = resources.api_quotas.gemini;
                    document.getElementById('gemini-quota').textContent = gemini.used + '/' + gemini.limit;
                }
                if (resources.api_quotas.github) {
                    const github = resources.api_quotas.github;
                    document.getElementById('github-quota').textContent = github.used + '/' + github.limit;
                }
            }
        }

        // Update every 5 seconds
        setInterval(updateDashboard, 5000);
        updateDashboard(); // Initial load
    </script>
</body>
</html>
