<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Terminal Test</title>
    <style>
        body { background: #0a1628; color: #00E5FF; font-family: monospace; padding: 2rem; }
        #status { margin: 1rem 0; }
        .progress { width: 300px; height: 20px; background: #000; border: 2px solid #00E5FF; }
        .bar { height: 100%; width: 0%; background: #00E5FF; transition: width 0.3s; }
    </style>
</head>
<body>
    <h1>Terminal Loading Test</h1>
    <div id="status">Initializing...</div>
    <div class="progress">
        <div class="bar" id="progressBar"></div>
    </div>
    <div id="messages"></div>

    <script>
        console.log('Script loaded!');

        let progress = 0;
        const progressBar = document.getElementById('progressBar');
        const status = document.getElementById('status');
        const messages = document.getElementById('messages');

        function updateProgress() {
            progress += 5;
            if (progress <= 100) {
                progressBar.style.width = progress + '%';
                status.textContent = `Loading... ${progress}%`;
                messages.innerHTML += `<p>Progress: ${progress}%</p>`;
                setTimeout(updateProgress, 200);
            } else {
                status.textContent = 'Complete!';
            }
        }

        console.log('Starting progress...');
        setTimeout(updateProgress, 500);
    </script>
</body>
</html>
