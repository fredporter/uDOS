<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Loading...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <div>Loading markdown file...</div>
    </div>

    <script>
        // Get file path from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const filePath = urlParams.get('file');

        if (!filePath) {
            document.body.innerHTML = '<div style="text-align:center; padding: 40px;">Error: No file specified</div>';
        } else {
            // Fetch the file content
            fetch(filePath)
                .then(response => {
                    if (!response.ok) throw new Error('File not found');
                    return response.text();
                })
                .then(content => {
                    // Redirect to marked demo with text parameter
                    const markedUrl = `/extensions/cloned/marked-viewer/docs/demo/index.html?text=${encodeURIComponent(content)}`;
                    window.location.href = markedUrl;
                })
                .catch(error => {
                    document.body.innerHTML = `
                        <div style="text-align:center; padding: 40px;">
                            <h2>Error Loading File</h2>
                            <p>${error.message}</p>
                            <p style="font-size: 12px; color: #666; margin-top: 16px;">Path: ${filePath}</p>
                        </div>
                    `;
                });
        }
    </script>
</body>
</html>
