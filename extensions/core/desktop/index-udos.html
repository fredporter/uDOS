<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uDOS System Desktop v1.0.24 - Classic Mac OS Interface</title>
    <link rel="stylesheet" href="system7.css">
    <link rel="stylesheet" href="../shared/synthwave-dos-colors.css">

    <style>
        /* Synthwave DOS + System 7 Integration */
        :root {
            /* Override System 7 colors with Synthwave DOS where appropriate */
            --sys7-highlight: var(--color-cyan-bright);
            --sys7-selection: var(--color-blue-bright);
            --sys7-desktop-pattern: var(--color-gray-bright);
        }

        /* Enhanced Desktop with Synthwave gradient */
        .sys7-desktop {
            background: linear-gradient(135deg,
                #c6c6c6 0%,
                #b8b8b8 50%,
                #aaaaaa 100%);
            background-image:
                repeating-linear-gradient(45deg,
                    transparent,
                    transparent 2px,
                    rgba(0,0,0,.03) 2px,
                    rgba(0,0,0,.03) 4px),
                linear-gradient(135deg, #c6c6c6 0%, #aaaaaa 100%);
        }

        /* uDOS-specific window styles */
        .udos-window {
            box-shadow:
                4px 4px 0 rgba(0,0,0,0.2),
                0 0 20px rgba(0,255,255,0.1);
        }

        .udos-window .sys7-window-title-bar {
            background: linear-gradient(180deg,
                var(--color-blue-bright) 0%,
                var(--color-blue-dark) 100%);
            color: var(--color-white-bright);
        }

        /* Application Icons */
        .desktop-icon {
            position: absolute;
            width: 80px;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .desktop-icon:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .desktop-icon-image {
            font-size: 48px;
            margin-bottom: 4px;
            filter: drop-shadow(1px 1px 2px rgba(0,0,0,0.3));
        }

        .desktop-icon-label {
            background: rgba(255, 255, 255, 0.9);
            padding: 2px 4px;
            font-size: 11px;
            border: 1px solid var(--sys7-black);
        }

        /* Finder-style file list */
        .finder-list {
            font-family: var(--sys7-mono-font);
            font-size: 11px;
        }

        .finder-item {
            display: flex;
            justify-content: space-between;
            padding: 4px 8px;
            border-bottom: 1px solid var(--sys7-light-gray);
            cursor: pointer;
        }

        .finder-item:hover {
            background: var(--color-cyan-bright);
            color: var(--sys7-white);
        }

        .finder-item.selected {
            background: var(--sys7-highlight);
            color: var(--sys7-white);
        }

        /* Stats Panel */
        .stats-panel {
            padding: 12px;
            background: var(--sys7-white);
            border: 1px inset var(--sys7-medium-gray);
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin: 6px 0;
            font-size: 11px;
        }

        .stat-label {
            font-weight: bold;
        }

        .stat-value {
            font-family: var(--sys7-mono-font);
            color: var(--color-blue-dark);
        }

        /* System info box */
        .system-info {
            background: var(--sys7-white);
            border: 2px outset var(--sys7-medium-gray);
            padding: 16px;
        }

        .system-info h3 {
            margin-bottom: 12px;
            border-bottom: 2px solid var(--sys7-black);
            padding-bottom: 4px;
        }

        /* About box styling */
        .about-box {
            text-align: center;
            padding: 24px;
        }

        .about-logo {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .about-version {
            font-size: 14px;
            font-weight: bold;
            margin: 8px 0;
        }

        .about-credits {
            font-size: 10px;
            color: var(--sys7-dark-gray);
            margin-top: 16px;
            line-height: 1.6;
        }

        /* Command Palette */
        .command-palette {
            background: var(--sys7-white);
            border: 2px outset var(--sys7-medium-gray);
            padding: 12px;
        }

        .command-input {
            width: 100%;
            padding: 8px;
            font-family: var(--sys7-mono-font);
            font-size: 12px;
            border: 2px inset var(--sys7-medium-gray);
            margin-bottom: 12px;
        }

        .command-output {
            background: var(--sys7-black);
            color: var(--color-green-bright);
            font-family: var(--sys7-mono-font);
            font-size: 11px;
            padding: 12px;
            height: 200px;
            overflow-y: auto;
            border: 1px solid var(--sys7-dark-gray);
        }

        .command-prompt {
            color: var(--color-cyan-bright);
        }

        /* Resize handle enhancement */
        .sys7-window-resize {
            background-image: repeating-linear-gradient(
                -45deg,
                var(--sys7-dark-gray),
                var(--sys7-dark-gray) 2px,
                transparent 2px,
                transparent 4px
            );
        }
    </style>
</head>
<body>
    <script src="system7.js"></script>
    <script>
        // Desktop icon positions
        const desktopIcons = [
            { id: 'terminal', icon: '💻', label: 'Terminal', x: 20, y: 40, port: 8889 },
            { id: 'markdown', icon: '📖', label: 'Knowledge', x: 20, y: 140, port: 9000 },
            { id: 'teletext', icon: '📺', label: 'Teletext', x: 20, y: 240, port: 8890 },
            { id: 'character', icon: '✏️', label: 'Character', x: 20, y: 340, port: 8891 },
            { id: 'dashboard', icon: '🎮', label: 'Dashboard', x: 20, y: 440, port: 8888 },
            { id: 'files', icon: '📁', label: 'Files', x: 20, y: 540, port: 8000 }
        ];

        document.addEventListener('DOMContentLoaded', function() {
            console.log('%c🖥️ uDOS System Desktop v1.0.24', 'font-size: 16px; font-weight: bold; color: #00ffff;');
            console.log('%cClassic Mac OS Interface • System 7 Framework', 'color: #888;');

            setTimeout(() => {
                // Create desktop icons
                createDesktopIcons();

                // Create About uDOS window
                createAboutWindow();

                // Create System Info window
                setTimeout(() => createSystemInfoWindow(), 800);

                // Create Finder window
                setTimeout(() => createFinderWindow(), 1600);

                // Create Command Palette (hidden initially)
                setTimeout(() => createCommandPalette(), 2400);
            }, 500);
        });

        function createDesktopIcons() {
            const desktop = document.querySelector('.sys7-desktop') || document.body;

            desktopIcons.forEach(icon => {
                const iconEl = document.createElement('div');
                iconEl.className = 'desktop-icon';
                iconEl.style.left = icon.x + 'px';
                iconEl.style.top = icon.y + 'px';
                iconEl.innerHTML = `
                    <div class="desktop-icon-image">${icon.icon}</div>
                    <div class="desktop-icon-label">${icon.label}</div>
                `;
                iconEl.addEventListener('dblclick', () => {
                    window.open(`http://localhost:${icon.port}`, '_blank');
                });
                desktop.appendChild(iconEl);
            });
        }

        function createAboutWindow() {
            const content = document.createElement('div');
            content.className = 'about-box';
            content.innerHTML = `
                <div class="about-logo">🖥️</div>
                <div class="about-version">uDOS System Desktop</div>
                <div style="font-size: 18px; font-weight: bold; margin: 4px 0;">v1.0.24</div>
                <div style="margin: 16px 0; padding: 12px; background: #f0f0f0; border: 1px solid #888;">
                    <strong>Phase 7 Complete</strong><br>
                    System 7 Framework Integration<br>
                    Synthwave DOS Color Palette
                </div>
                <div class="about-credits">
                    Built with System 7 CSS Framework<br>
                    Chicago font • Classic Mac OS aesthetic<br>
                    Deep uDOS integration<br><br>
                    © 2024-2025 uDOS Project<br>
                    Retro Computing • Modern Web
                </div>
            `;

            window.system7.createWindow({
                title: 'About uDOS',
                content: content,
                x: 120,
                y: 60,
                width: 400,
                height: 420,
                className: 'udos-window'
            });
        }

        function createSystemInfoWindow() {
            const content = document.createElement('div');
            content.className = 'system-info';
            content.innerHTML = `
                <h3>System Information</h3>
                <div class="stats-panel">
                    <div class="stat-row">
                        <span class="stat-label">System:</span>
                        <span class="stat-value">uDOS v1.0.24</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Interface:</span>
                        <span class="stat-value">System 7 Framework</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">CPU:</span>
                        <span class="stat-value">Apple M1 Pro</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Memory:</span>
                        <span class="stat-value">16 GB</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Storage:</span>
                        <span class="stat-value">500 GB SSD</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Extensions:</span>
                        <span class="stat-value">6 active</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Commits:</span>
                        <span class="stat-value">10 (Phase 1-6)</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Branch:</span>
                        <span class="stat-value">v1.0.24-extensions</span>
                    </div>
                </div>

                <h3 style="margin-top: 20px;">Color Palette</h3>
                <div style="padding: 12px; background: white; border: 1px inset #aaa;">
                    <div style="margin: 4px 0;">
                        <span style="display: inline-block; width: 20px; height: 20px; background: var(--color-cyan-bright); border: 1px solid black; vertical-align: middle;"></span>
                        Cyan Bright
                    </div>
                    <div style="margin: 4px 0;">
                        <span style="display: inline-block; width: 20px; height: 20px; background: var(--color-blue-bright); border: 1px solid black; vertical-align: middle;"></span>
                        Blue Bright
                    </div>
                    <div style="margin: 4px 0;">
                        <span style="display: inline-block; width: 20px; height: 20px; background: var(--color-green-bright); border: 1px solid black; vertical-align: middle;"></span>
                        Green Bright
                    </div>
                    <div style="margin: 4px 0;">
                        <span style="display: inline-block; width: 20px; height: 20px; background: var(--color-orange-bright); border: 1px solid black; vertical-align: middle;"></span>
                        Orange Bright
                    </div>
                </div>
            `;

            window.system7.createWindow({
                title: 'System Information',
                content: content,
                x: 560,
                y: 60,
                width: 420,
                height: 520,
                className: 'udos-window'
            });
        }

        function createFinderWindow() {
            const content = document.createElement('div');
            content.className = 'system-info';
            content.innerHTML = `
                <h3>📁 uDOS Extensions</h3>
                <div class="finder-list" style="margin-top: 12px;">
                    <div class="finder-item">
                        <span>📖 Markdown Viewer</span>
                        <span style="color: #00ff00;">ACTIVE</span>
                    </div>
                    <div class="finder-item">
                        <span>🎨 Character Editor</span>
                        <span style="color: #00ff00;">ACTIVE</span>
                    </div>
                    <div class="finder-item">
                        <span>📺 Teletext</span>
                        <span style="color: #00ff00;">ACTIVE</span>
                    </div>
                    <div class="finder-item">
                        <span>💻 C64 Terminal</span>
                        <span style="color: #00ff00;">ACTIVE</span>
                    </div>
                    <div class="finder-item">
                        <span>🎮 Dashboard (NES)</span>
                        <span style="color: #00ff00;">ACTIVE</span>
                    </div>
                    <div class="finder-item">
                        <span>🖥️ System Desktop</span>
                        <span style="color: #00ff00;">ACTIVE</span>
                    </div>
                </div>

                <h3 style="margin-top: 20px;">📊 Recent Activity</h3>
                <div style="background: white; border: 1px inset #aaa; padding: 12px; margin-top: 8px; max-height: 150px; overflow-y: auto; font-size: 10px;">
                    <div style="margin: 4px 0; padding: 4px; border-left: 3px solid var(--color-cyan-bright);">
                        <strong>Phase 6:</strong> Dashboard NES redesign
                    </div>
                    <div style="margin: 4px 0; padding: 4px; border-left: 3px solid var(--color-green-bright);">
                        <strong>Phase 5.1:</strong> Typography enhancement
                    </div>
                    <div style="margin: 4px 0; padding: 4px; border-left: 3px solid var(--color-blue-bright);">
                        <strong>Phase 5:</strong> Markdown Viewer upgrade
                    </div>
                    <div style="margin: 4px 0; padding: 4px; border-left: 3px solid var(--color-orange-bright);">
                        <strong>Phase 4.7:</strong> Character Editor
                    </div>
                </div>
            `;

            window.system7.createWindow({
                title: 'Finder - uDOS',
                content: content,
                x: 220,
                y: 200,
                width: 500,
                height: 450,
                className: 'udos-window'
            });
        }

        function createCommandPalette() {
            const content = document.createElement('div');
            content.className = 'command-palette';
            content.innerHTML = `
                <div style="margin-bottom: 12px;">
                    <strong>uDOS Command Palette</strong>
                </div>
                <input type="text" class="command-input" id="cmd-input" placeholder="Type a command..." />
                <div class="command-output" id="cmd-output">
<span class="command-prompt">$</span> Welcome to uDOS Command Palette v1.0.24
<span class="command-prompt">$</span> Type 'help' for available commands
<span class="command-prompt">$</span>
                </div>
            `;

            const win = window.system7.createWindow({
                title: 'Command Palette',
                content: content,
                x: 120,
                y: 520,
                width: 600,
                height: 300,
                className: 'udos-window'
            });

            // Hide initially
            if (win) win.style.display = 'none';

            // Setup command input
            setTimeout(() => {
                const input = document.getElementById('cmd-input');
                const output = document.getElementById('cmd-output');

                if (input && output) {
                    input.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            const cmd = this.value.trim();
                            if (cmd) {
                                executeCommand(cmd, output);
                                this.value = '';
                            }
                        }
                    });
                }
            }, 100);

            // Keyboard shortcut to toggle
            document.addEventListener('keydown', function(e) {
                if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
                    e.preventDefault();
                    if (win) {
                        win.style.display = win.style.display === 'none' ? 'block' : 'none';
                        if (win.style.display !== 'none') {
                            const input = document.getElementById('cmd-input');
                            if (input) input.focus();
                        }
                    }
                }
            });
        }

        function executeCommand(cmd, output) {
            const line = document.createElement('div');
            line.innerHTML = `<span class="command-prompt">$</span> ${cmd}`;
            output.appendChild(line);

            const response = document.createElement('div');
            response.style.color = '#00ff00';
            response.style.marginLeft = '12px';

            // Simple command handling
            if (cmd === 'help') {
                response.innerHTML = `Available commands:
  help        - Show this help
  status      - Show system status
  extensions  - List extensions
  git         - Show git info
  clear       - Clear output
  open [ext]  - Open extension`;
            } else if (cmd === 'status') {
                response.innerHTML = `System Status:
  Version: v1.0.24
  Branch: v1.0.24-extensions
  Phase: 7 (in progress)
  Commits: 10
  Extensions: 6 active`;
            } else if (cmd === 'extensions') {
                response.innerHTML = `Active Extensions:
  • Markdown Viewer (port 9000)
  • Character Editor (port 8891)
  • Teletext (port 8890)
  • C64 Terminal (port 8889)
  • Dashboard NES (port 8888)
  • System Desktop (current)`;
            } else if (cmd === 'git') {
                response.innerHTML = `Git Status:
  Branch: v1.0.24-extensions
  Commits: 10
  Last: Phase 6 - Dashboard NES
  Next: Phase 7 - System Desktop`;
            } else if (cmd === 'clear') {
                output.innerHTML = '<span class="command-prompt">$</span> ';
                return;
            } else if (cmd.startsWith('open ')) {
                const ext = cmd.split(' ')[1];
                response.innerHTML = `Opening ${ext}...`;
                setTimeout(() => {
                    const ports = {
                        'terminal': 8889,
                        'markdown': 9000,
                        'teletext': 8890,
                        'character': 8891,
                        'dashboard': 8888
                    };
                    const port = ports[ext] || 8888;
                    window.open(`http://localhost:${port}`, '_blank');
                }, 500);
            } else {
                response.innerHTML = `Command not found: ${cmd}
Type 'help' for available commands`;
                response.style.color = '#ff0040';
            }

            output.appendChild(response);
            output.scrollTop = output.scrollHeight;
        }
    </script>
</body>
</html>
