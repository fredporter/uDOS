<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System 7 Web Framework - Demo</title>
    <link rel="stylesheet" href="system7.css">
    <style>
        /* Demo-specific styles */
        .demo-content {
            padding: 16px;
            line-height: 1.4;
        }

        .demo-section {
            margin-bottom: 24px;
            padding: 12px;
            border: 1px solid var(--sys7-medium-gray);
            background: var(--sys7-white);
        }

        .demo-section h3 {
            margin-bottom: 12px;
            font-weight: bold;
            border-bottom: 1px solid var(--sys7-medium-gray);
            padding-bottom: 4px;
        }

        .demo-controls {
            display: flex;
            gap: 12px;
            margin: 8px 0;
            flex-wrap: wrap;
        }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        .color-swatch {
            width: 20px;
            height: 20px;
            border: 1px solid var(--sys7-black);
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <!-- The System 7 framework will create the desktop and menu bar automatically -->

    <script src="system7.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Wait for System 7 to initialize
            setTimeout(() => {
                // Create welcome window
                createWelcomeWindow();

                // Create demo windows
                setTimeout(() => {
                    createControlsDemo();
                    createColorsDemo();
                }, 1000);
            }, 500);
        });

        function createWelcomeWindow() {
            const welcomeContent = document.createElement('div');
            welcomeContent.className = 'demo-content';
            welcomeContent.innerHTML = `
                <h2>Welcome to System 7 Web Framework</h2>
                <p>This is a faithful recreation of the classic Macintosh System 7 interface for modern web browsers.</p>

                <div class="demo-section">
                    <h3>Features</h3>
                    <ul>
                        <li>✅ Authentic System 7 visual design</li>
                        <li>✅ Draggable and resizable windows</li>
                        <li>✅ Working menu bar with dropdowns</li>
                        <li>✅ Classic UI controls (buttons, checkboxes, etc.)</li>
                        <li>✅ Modal dialogs and alerts</li>
                        <li>✅ Keyboard shortcuts</li>
                        <li>✅ Responsive design</li>
                    </ul>
                </div>

                <div class="demo-section">
                    <h3>Try It Out</h3>
                    <div class="demo-controls">
                        <button class="sys7-button" onclick="demoAlert()">Show Alert</button>
                        <button class="sys7-button" onclick="demoConfirm()">Show Confirm</button>
                        <button class="sys7-button" onclick="demoDialog()">Custom Dialog</button>
                        <button class="sys7-button" onclick="createTextEditor()">Text Editor</button>
                    </div>
                </div>

                <div class="demo-section">
                    <h3>Keyboard Shortcuts</h3>
                    <p><strong>Cmd/Ctrl+N</strong> - New Document</p>
                    <p><strong>Cmd/Ctrl+W</strong> - Close Window</p>
                    <p><strong>Cmd/Ctrl+Q</strong> - Quit Application</p>
                </div>
            `;

            window.system7.createWindow({
                title: 'Welcome to System 7',
                content: welcomeContent,
                x: 50,
                y: 80,
                width: 600,
                height: 450
            });
        }

        function createControlsDemo() {
            const controlsContent = document.createElement('div');
            controlsContent.className = 'demo-content';

            const section1 = document.createElement('div');
            section1.className = 'demo-section';
            section1.innerHTML = '<h3>Buttons</h3>';

            const buttonControls = document.createElement('div');
            buttonControls.className = 'demo-controls';
            buttonControls.appendChild(window.system7.createButton('Normal Button'));
            buttonControls.appendChild(window.system7.createButton('Default Button', null, true));

            const disabledButton = window.system7.createButton('Disabled Button');
            disabledButton.disabled = true;
            buttonControls.appendChild(disabledButton);

            section1.appendChild(buttonControls);

            const section2 = document.createElement('div');
            section2.className = 'demo-section';
            section2.innerHTML = '<h3>Checkboxes & Radio Buttons</h3>';

            const checkboxes = document.createElement('div');
            checkboxes.appendChild(window.system7.createCheckbox('Option 1', true));
            checkboxes.appendChild(document.createElement('br'));
            checkboxes.appendChild(window.system7.createCheckbox('Option 2', false));
            checkboxes.appendChild(document.createElement('br'));
            checkboxes.appendChild(window.system7.createCheckbox('Option 3', false));

            const radios = document.createElement('div');
            radios.style.marginTop = '12px';
            radios.appendChild(window.system7.createRadio('demo', 'Choice A', 'a', true));
            radios.appendChild(document.createElement('br'));
            radios.appendChild(window.system7.createRadio('demo', 'Choice B', 'b'));
            radios.appendChild(document.createElement('br'));
            radios.appendChild(window.system7.createRadio('demo', 'Choice C', 'c'));

            section2.appendChild(checkboxes);
            section2.appendChild(radios);

            const section3 = document.createElement('div');
            section3.className = 'demo-section';
            section3.innerHTML = '<h3>Text Input & List</h3>';

            const textInput = window.system7.createTextInput('Enter text here...', 'Sample text');
            section3.appendChild(textInput);

            const list = window.system7.createList([
                'Item 1',
                'Item 2',
                'Item 3',
                'Item 4',
                'Item 5'
            ], (value, index) => {
                window.system7.alert(`Selected: ${value} (index ${index})`);
            });
            list.style.marginTop = '12px';
            list.style.height = '120px';
            section3.appendChild(list);

            controlsContent.appendChild(section1);
            controlsContent.appendChild(section2);
            controlsContent.appendChild(section3);

            window.system7.createWindow({
                title: 'UI Controls Demo',
                content: controlsContent,
                x: 200,
                y: 120,
                width: 400,
                height: 500
            });
        }

        function createColorsDemo() {
            const colorsContent = document.createElement('div');
            colorsContent.className = 'demo-content';

            const section = document.createElement('div');
            section.className = 'demo-section';
            section.innerHTML = '<h3>System 7 Color Palette</h3>';

            const colors = [
                { name: 'White', value: '#FFFFFF' },
                { name: 'Light Gray', value: '#DDDDDD' },
                { name: 'Medium Gray', value: '#AAAAAA' },
                { name: 'Dark Gray', value: '#777777' },
                { name: 'Black', value: '#000000' },
                { name: 'Desktop Gray', value: '#C6C6C6' },
                { name: 'Selection Blue', value: '#316AC5' },
                { name: 'Highlight Blue', value: '#0000FF' }
            ];

            colors.forEach(color => {
                const colorRow = document.createElement('div');
                colorRow.style.margin = '8px 0';
                colorRow.innerHTML = `
                    <span class="color-swatch" style="background: ${color.value};"></span>
                    <strong>${color.name}</strong> - ${color.value}
                `;
                section.appendChild(colorRow);
            });

            const progressSection = document.createElement('div');
            progressSection.className = 'demo-section';
            progressSection.innerHTML = '<h3>Progress Bar</h3>';

            const progress = document.createElement('div');
            progress.className = 'sys7-progress';
            progress.style.marginBottom = '12px';

            const progressBar = document.createElement('div');
            progressBar.className = 'sys7-progress-bar';
            progressBar.style.width = '60%';
            progress.appendChild(progressBar);

            const progressStriped = document.createElement('div');
            progressStriped.className = 'sys7-progress sys7-progress-striped';

            const progressBarStriped = document.createElement('div');
            progressBarStriped.className = 'sys7-progress-bar';
            progressBarStriped.style.width = '40%';
            progressStriped.appendChild(progressBarStriped);

            progressSection.appendChild(progress);
            progressSection.appendChild(progressStriped);

            colorsContent.appendChild(section);
            colorsContent.appendChild(progressSection);

            window.system7.createWindow({
                title: 'Colors & Progress',
                content: colorsContent,
                x: 350,
                y: 150,
                width: 350,
                height: 400
            });
        }

        function createTextEditor() {
            const editorContent = document.createElement('div');
            editorContent.style.height = '100%';
            editorContent.style.display = 'flex';
            editorContent.style.flexDirection = 'column';

            const toolbar = document.createElement('div');
            toolbar.style.padding = '8px';
            toolbar.style.borderBottom = '1px solid var(--sys7-medium-gray)';
            toolbar.style.display = 'flex';
            toolbar.style.gap = '8px';

            toolbar.appendChild(window.system7.createButton('Bold'));
            toolbar.appendChild(window.system7.createButton('Italic'));
            toolbar.appendChild(window.system7.createButton('Underline'));

            const textarea = document.createElement('textarea');
            textarea.style.flex = '1';
            textarea.style.border = 'none';
            textarea.style.outline = 'none';
            textarea.style.padding = '12px';
            textarea.style.fontFamily = 'var(--sys7-mono-font)';
            textarea.style.fontSize = '12px';
            textarea.style.resize = 'none';
            textarea.value = `Welcome to the System 7 Text Editor!

This is a simple text editor built with the System 7 Web Framework.

Features:
• Classic Macintosh interface
• Resizable window
• Toolbar buttons
• Monospace font

Try resizing the window or moving it around. The interface maintains the authentic System 7 look and feel.`;

            editorContent.appendChild(toolbar);
            editorContent.appendChild(textarea);

            window.system7.createWindow({
                title: 'Text Editor',
                content: editorContent,
                x: 100,
                y: 200,
                width: 500,
                height: 400
            });
        }

        function demoAlert() {
            window.system7.alert('This is a System 7 style alert dialog!', 'Alert Demo');
        }

        function demoConfirm() {
            window.system7.confirm(
                'Do you want to proceed with this action?',
                'Confirm Demo',
                () => window.system7.alert('You clicked OK!'),
                () => window.system7.alert('You clicked Cancel!')
            );
        }

        function demoDialog() {
            const dialogContent = document.createElement('div');
            dialogContent.innerHTML = `
                <p>This is a custom dialog with multiple controls:</p>
                <div style="margin: 12px 0;">
                    <label class="sys7-checkbox">
                        <input type="checkbox" checked>
                        <span>Enable notifications</span>
                    </label>
                </div>
                <div style="margin: 12px 0;">
                    <input type="text" class="sys7-text-input" placeholder="Enter your name" style="width: 100%;">
                </div>
                <div style="margin: 12px 0;">
                    <div class="sys7-list" style="height: 80px;">
                        <div class="sys7-list-item">Option 1</div>
                        <div class="sys7-list-item">Option 2</div>
                        <div class="sys7-list-item selected">Option 3</div>
                        <div class="sys7-list-item">Option 4</div>
                    </div>
                </div>
            `;

            window.system7.showDialog({
                title: 'Custom Dialog',
                content: dialogContent,
                buttons: [
                    { text: 'Cancel' },
                    { text: 'Apply', action: () => window.system7.alert('Settings applied!') },
                    { text: 'OK', default: true, action: () => window.system7.alert('Dialog completed!') }
                ]
            });
        }
    </script>
</body>
</html>
