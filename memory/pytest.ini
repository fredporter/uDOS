[pytest]
# pytest configuration for uDOS v1.2.x
# Configured for memory/ucode/ test structure

testpaths = ucode/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    slow: Slow running tests
    requires_api: Tests requiring API keys

# Coverage options (if pytest-cov installed)
# addopts = --cov=core --cov-report=html --cov-report=term

# Test discovery
norecursedirs = 
    .git
    .archive
    __pycache__
    *.egg-info
    build
    dist
    sandbox
    scripts

# Logging
log_cli = false
log_cli_level = INFO
log_file = ../logs/pytest.log
log_file_level = DEBUG

# Timeout (if pytest-timeout installed)
# timeout = 300
# timeout_method = thread
