<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 600"
     width="800"
     height="600">

  <title>DIY Water Filter System</title>
  <desc>A technical diagram illustrating a multi-layer DIY water filtration system, comprising gravel, sand, and activated charcoal layers within a container, with indicators for water flow direction and key dimensions.</desc>

  <defs>
    <!-- Pattern definitions (Mac OS System 1 Bitmap style, 8x8 pixel repeating) -->
    <!-- All patterns use pure black and white pixels for density variation -->
    
    <!-- gray-12: Lightest shade (approx 12.5% black pixels on white) -->
    <pattern id="gray-12" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="white"/>
      <path d="M0,0h1v1h-1z M4,0h1v1h-1z M0,4h1v1h-1z M4,4h1v1h-1z M2,2h1v1h-1z M6,2h1v1h-1z M2,6h1v1h-1z M6,6h1v1h-1z" fill="black"/>
    </pattern>
    
    <!-- gray-37: Medium-light shade (approx 37.5% black pixels on white) -->
    <pattern id="gray-37" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="white"/>
      <path d="M0,0h2v2h-2z M4,0h2v2h-2z M0,4h2v2h-2z M4,4h2v2h-2z M2,2h2v2h-2z M6,2h2v2h-2z M2,6h2v2h-2z M6,6h2v2h-2z" fill="black"/>
    </pattern>

    <!-- gray-50: 50% black pixels on white (checkerboard) - from prompt -->
    <pattern id="gray-50" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <path d="M0,0 L4,0 L4,4 L0,4 Z M4,4 L8,4 L8,8 L4,8 Z" fill="#000"/>
    </pattern>

    <!-- gray-75: Dark shade (approx 75% black pixels on white) -->
    <pattern id="gray-75" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="black"/>
      <path d="M0,0h1v1h-1z M4,0h1v1h-1z M0,4h1v1h-1z M4,4h1v1h-1z M2,2h1v1h-1z M6,2h1v1h-1z M2,6h1v1h-1z M6,6h1v1h-1z" fill="white"/>
    </pattern>

    <!-- Crosshatch texture (for metal/hard surfaces like drainage) -->
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,0 L8,8 M8,0 L0,8" stroke="#000" stroke-width="0.3"/>
    </pattern>

    <!-- Diagonal lines texture (not used here, but for completeness as per prompt) -->
    <pattern id="diagonal" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,0 L8,8 M-2,6 L2,10 M6,-2 L10,2" stroke="#000" stroke-width="0.5"/>
    </pattern>
    
    <!-- CoreUI-style Outlined Icons (16x16px base) -->
    <g id="icon-arrow-down">
      <path d="M8 4V12 M5 9L8 12L11 9" stroke="#000" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
    <g id="icon-arrow-up">
      <path d="M8 12V4 M5 7L8 4L11 7" stroke="#000" stroke-width="1.5" fill="none" stroke-linejoin="round" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- Diagram Title -->
  <text x="400" y="40" text-anchor="middle" font-size="16" font-weight="bold" font-family="monospace">DIY WATER FILTER SYSTEM</text>

  <g id="primary-structure">
    <!-- Main filter container -->
    <rect x="250" y="80" width="300" height="450" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>

    <!-- Drainage plate at the bottom -->
    <rect x="250" y="500" width="300" height="10" fill="url(#crosshatch)" stroke="#000" stroke-width="1.5"/>
    <!-- Perforations/support on drainage plate -->
    <line x1="260" y1="505" x2="540" y2="505" stroke="#000" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="260" y1="502" x2="540" y2="502" stroke="#000" stroke-width="0.5" stroke-dasharray="4,4"/>
    <line x1="260" y1="508" x2="540" y2="508" stroke="#000" stroke-width="0.5" stroke-dasharray="4,4"/>

    <!-- Inlet pipe structure -->
    <rect x="550" y="100" width="50" height="20" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
    <rect x="590" y="100" width="10" height="40" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>

    <!-- Outlet pipe structure -->
    <rect x="200" y="510" width="50" height="20" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
    <rect x="190" y="490" width="10" height="40" fill="#FFFFFF" stroke="#000" stroke-width="1.5"/>
  </g>

  <g id="shading">
    <!-- Layer 1: Activated Charcoal (Top) -->
    <rect x="251" y="140" width="298" height="100" fill="url(#gray-75)"/>
    <!-- Layer 2: Fine Sand (Middle) -->
    <rect x="251" y="240" width="298" height="130" fill="url(#gray-50)"/>
    <!-- Layer 3: Coarse Gravel (Bottom) -->
    <rect x="251" y="370" width="298" height="130" fill="url(#gray-37)"/>
    <!-- Dirty Water Reservoir (Topmost section) -->
    <rect x="251" y="81" width="298" height="59" fill="url(#gray-12)"/>
    <!-- Clean Water Collection (Below drainage) -->
    <rect x="251" y="510" width="298" height="20" fill="url(#gray-12)"/>
  </g>

  <g id="details">
    <!-- Layer separator lines (0.5px) -->
    <line x1="250" y1="140" x2="550" y2="140" stroke="#000" stroke-width="0.5"/>
    <line x1="250" y1="240" x2="550" y2="240" stroke="#000" stroke-width="0.5"/>
    <line x1="250" y1="370" x2="550" y2="370" stroke="#000" stroke-width="0.5"/>
    <line x1="250" y1="500" x2="550" y2="500" stroke="#000" stroke-width="0.5"/>

    <!-- Water Flow Direction (0.5px dashed lines) -->
    <!-- Inlet to top layer -->
    <path d="M600 120 L580 120 L580 100 L550 100" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
    <line x1="550" y1="120" x2="550" y2="160" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Through charcoal -->
    <line x1="530" y1="160" x2="530" y2="250" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Through sand -->
    <line x1="500" y1="250" x2="500" y2="380" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Through gravel -->
    <line x1="470" y1="380" x2="470" y2="500" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Under drainage plate to outlet -->
    <line x1="470" y1="520" x2="250" y2="520" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
    <!-- Outlet path -->
    <path d="M250 520 L220 520 L220 510 L200 510" stroke="#000" stroke-width="0.5" stroke-dasharray="3,2"/>
  </g>

  <g id="labels">
    <!-- Layer Labels (left-aligned) -->
    <text x="260" y="125" font-size="11" font-family="monospace" aria-label="Dirty Water Reservoir">DIRTY WATER RESERVOIR</text>
    <text x="260" y="160" font-size="11" font-family="monospace" aria-label="Activated Charcoal layer">ACTIVATED CHARCOAL</text>
    <text x="260" y="260" font-size="11" font-family="monospace" aria-label="Fine Sand layer">FINE SAND</text>
    <text x="260" y="390" font-size="11" font-family="monospace" aria-label="Coarse Gravel layer">COARSE GRAVEL</text>
    <text x="260" y="525" font-size="11" font-family="monospace" aria-label="Drainage and Collection area">DRAINAGE &amp; COLLECTION</text>

    <!-- Inlet/Outlet Labels -->
    <text x="610" y="115" font-size="11" font-family="monospace" text-anchor="start" aria-label="Dirty water inlet">DIRTY WATER IN</text>
    <text x="180" y="525" font-size="11" font-family="monospace" text-anchor="end" aria-label="Filtered water outlet">FILTERED WATER OUT</text>
  </g>

  <g id="measurements">
    <!-- Overall height measurement (0.5px dashed) -->
    <line x1="240" y1="80" x2="240" y2="530" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M237 85 L240 80 L243 85 M237 525 L240 530 L243 525" fill="none" stroke="#000" stroke-width="0.5"/>
    <text x="235" y="300" text-anchor="end" font-size="9" font-style="italic" font-family="monospace" aria-label="Total height is 450 millimeters">450mm Total</text>

    <!-- Charcoal layer height -->
    <line x1="560" y1="140" x2="560" y2="240" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M557 145 L560 140 L563 145 M557 235 L560 240 L563 235" fill="none" stroke="#000" stroke-width="0.5"/>
    <text x="565" y="190" text-anchor="start" font-size="9" font-style="italic" font-family="monospace" aria-label="Charcoal layer height is 100 millimeters">100mm Charcoal</text>

    <!-- Fine Sand layer height -->
    <line x1="560" y1="240" x2="560" y2="370" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M557 245 L560 240 L563 245 M557 365 L560 370 L563 365" fill="none" stroke="#000" stroke-width="0.5"/>
    <text x="565" y="305" text-anchor="start" font-size="9" font-style="italic" font-family="monospace" aria-label="Fine sand layer height is 130 millimeters">130mm Fine Sand</text>

    <!-- Coarse Gravel layer height -->
    <line x1="560" y1="370" x2="560" y2="500" stroke="#000" stroke-width="0.5" stroke-dasharray="2,2"/>
    <path d="M557 375 L560 370 L563 375 M557 495 L560 500 L563 495" fill="none" stroke="#000" stroke-width="0.5"/>
    <text x="565" y="435" text-anchor="start" font-size="9" font-style="italic" font-family="monospace" aria-label="Coarse gravel layer height is 130 millimeters">130mm Coarse Gravel</text>
  </g>

  <g id="icons">
    <!-- Incoming water arrow icon -->
    <use href="#icon-arrow-down" transform="translate(605, 120)" width="16" height="16" aria-label="Down arrow indicating dirty water flow in"/>
    <!-- Outgoing water arrow icon -->
    <use href="#icon-arrow-up" transform="translate(170, 495)" width="16" height="16" aria-label="Up arrow indicating filtered water flow out"/>
  </g>
</svg>