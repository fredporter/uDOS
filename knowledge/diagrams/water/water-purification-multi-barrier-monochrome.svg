<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <title>Water Purification Multi-Barrier System</title>
  <desc>Technical diagram showing three-stage water purification process using sedimentation, filtration, and chemical/heat treatment. Monochrome Technical-Kinetic style with standardized texture patterns.</desc>

  <!-- Define reusable texture patterns in defs -->
  <defs>
    <!-- Font embedding: Mallard font family -->
    <style type="text/css">
      @font-face {
        font-family: 'Mallard';
        src: url('../../extensions/assets/fonts/mallard/mallard-neueue.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
      }
      @font-face {
        font-family: 'Mallard';
        src: url('../../extensions/assets/fonts/mallard/mallard-blocky.otf') format('opentype');
        font-weight: bold;
        font-style: normal;
      }
      @font-face {
        font-family: 'Mallard Smooth';
        src: url('../../extensions/assets/fonts/mallard/mallard-smooth.otf') format('opentype');
        font-weight: normal;
        font-style: normal;
      }
    </style>

    <!-- Solid black fill -->
    <pattern id="solid-black" patternUnits="userSpaceOnUse" width="1" height="1">
      <rect width="1" height="1" fill="#000"/>
    </pattern>

    <!-- Grayscale patterns (via density, NOT opacity) -->
    <!-- 10% gray (very light stipple) -->
    <pattern id="gray-10" patternUnits="userSpaceOnUse" width="10" height="10">
      <rect width="10" height="10" fill="#FFF"/>
      <circle cx="5" cy="5" r="0.4" fill="#000"/>
    </pattern>

    <!-- 25% gray (light stipple) -->
    <pattern id="gray-25" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <circle cx="2" cy="2" r="0.5" fill="#000"/>
      <circle cx="6" cy="6" r="0.5" fill="#000"/>
    </pattern>

    <!-- 40% gray (medium stipple) -->
    <pattern id="gray-40" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#FFF"/>
      <circle cx="1.5" cy="1.5" r="0.6" fill="#000"/>
      <circle cx="4.5" cy="4.5" r="0.6" fill="#000"/>
      <circle cx="1.5" cy="4.5" r="0.5" fill="#000"/>
    </pattern>

    <!-- 50% gray (medium hatching) -->
    <pattern id="gray-50" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#FFF"/>
      <path d="M0,0 L4,4 M0,4 L4,0" stroke="#000" stroke-width="0.4"/>
    </pattern>

    <!-- 60% gray (dense stipple) -->
    <pattern id="gray-60" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#FFF"/>
      <circle cx="1" cy="1" r="0.7" fill="#000"/>
      <circle cx="3" cy="3" r="0.7" fill="#000"/>
      <circle cx="1" cy="3" r="0.6" fill="#000"/>
      <circle cx="3" cy="1" r="0.6" fill="#000"/>
    </pattern>

    <!-- 75% gray (very dense cross-hatch) -->
    <pattern id="gray-75" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="#FFF"/>
      <path d="M0,0 L3,3 M0,3 L3,0 M0,1.5 L3,1.5 M1.5,0 L1.5,3" stroke="#000" stroke-width="0.5"/>
    </pattern>

    <!-- 90% gray (near-black stipple) -->
    <pattern id="gray-90" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="3" fill="#000"/>
      <circle cx="1.5" cy="1.5" r="0.3" fill="#FFF"/>
    </pattern>

    <!-- Hatching pattern for mechanical/structural elements -->
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#FFF"/>
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#000" stroke-width="0.3"/>
    </pattern>

    <!-- Cross-hatching for dense materials -->
    <pattern id="cross-hatch" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#FFF"/>
      <path d="M-1,1 l2,-2 M0,4 l4,-4 M3,5 l2,-2" stroke="#000" stroke-width="0.3"/>
      <path d="M-1,3 l2,2 M0,0 l4,4 M3,-1 l2,2" stroke="#000" stroke-width="0.3"/>
    </pattern>

    <!-- Stipple pattern for soft/atmospheric -->
    <pattern id="stipple" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="6" fill="#FFF"/>
      <circle cx="1" cy="1" r="0.5" fill="#000"/>
      <circle cx="4" cy="4" r="0.5" fill="#000"/>
    </pattern>

    <!-- Topographic/wavy pattern for water/environmental -->
    <pattern id="topo-lines" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <path d="M0,4 Q2,2 4,4 T8,4" stroke="#000" stroke-width="0.3" fill="none"/>
      <path d="M0,6 Q2,4 4,6 T8,6" stroke="#000" stroke-width="0.3" fill="none"/>
    </pattern>
  </defs>

  <!-- Title -->
  <text x="400" y="30" font-family="Mallard, Arial, sans-serif" font-size="20" font-weight="bold" text-anchor="middle" fill="#000">
    Multi-Barrier Water Purification System
  </text>
  <text x="400" y="50" font-family="Mallard, Arial, sans-serif" font-size="12" text-anchor="middle" fill="#000">
    Technical-Kinetic Design | Layered Defense Against Contaminants
  </text>

  <!-- Stage 1: Contaminated Water Source -->
  <g id="stage-1">
    <rect x="50" y="100" width="100" height="100" fill="url(#topo-lines)" stroke="#000" stroke-width="1.5"/>
    <text x="100" y="150" font-family="Mallard, Arial, sans-serif" font-size="14" font-weight="bold" text-anchor="middle" fill="#000">SOURCE</text>
    <text x="100" y="170" font-family="Mallard, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">Contaminated</text>
    <text x="100" y="185" font-family="Mallard, Arial, sans-serif" font-size="10" text-anchor="middle" fill="#000">Water</text>

    <!-- Debris particles (cross-hatch) -->
    <circle cx="70" cy="120" r="4" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="120" cy="130" r="3" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="85" cy="165" r="3" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Arrow 1 -->
  <g id="arrow-1">
    <line x1="150" y1="150" x2="190" y2="150" stroke="#000" stroke-width="1.5"/>
    <polygon points="190,150 185,145 185,155" fill="#000"/>
  </g>

  <!-- Barrier 1: Sedimentation -->
  <g id="barrier-1">
    <rect x="200" y="100" width="120" height="100" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <text x="260" y="120" font-family="Mallard, Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">BARRIER 1</text>
    <text x="260" y="140" font-family="Mallard, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000">Sedimentation</text>
    <text x="260" y="155" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">(Gravity Settlement)</text>

    <!-- Settled particles at bottom -->
    <circle cx="215" cy="185" r="3" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="230" cy="188" r="3" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="245" cy="187" r="2" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="260" cy="190" r="3" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="280" cy="188" r="2" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="295" cy="189" r="3" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>

    <!-- Clearer water above (lighter gray-25 pattern instead of opacity) -->
    <rect x="205" y="110" width="110" height="50" fill="url(#gray-25)" stroke="none"/>
  </g>

  <!-- Arrow 2 -->
  <g id="arrow-2">
    <line x1="320" y1="150" x2="360" y2="150" stroke="#000" stroke-width="1.5"/>
    <polygon points="360,150 355,145 355,155" fill="#000"/>
  </g>

  <!-- Barrier 2: Filtration -->
  <g id="barrier-2">
    <rect x="370" y="100" width="120" height="100" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <text x="430" y="120" font-family="Mallard, Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">BARRIER 2</text>
    <text x="430" y="140" font-family="Mallard, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000">Filtration</text>
    <text x="430" y="155" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">(Physical Removal)</text>

    <!-- Filter layers (hatching for mechanical element) -->
    <line x1="385" y1="165" x2="475" y2="165" stroke="#000" stroke-width="1.5"/>
    <line x1="385" y1="168" x2="475" y2="168" stroke="#000" stroke-width="0.5"/>
    <line x1="385" y1="171" x2="475" y2="171" stroke="#000" stroke-width="0.5"/>
    <line x1="385" y1="174" x2="475" y2="174" stroke="#000" stroke-width="0.5"/>
    <line x1="385" y1="177" x2="475" y2="177" stroke="#000" stroke-width="0.5"/>
    <line x1="385" y1="180" x2="475" y2="180" stroke="#000" stroke-width="1.5"/>

    <!-- Filter material (cross-hatch pattern) -->
    <rect x="385" y="165" width="90" height="15" fill="url(#hatch)" stroke="none"/>

    <!-- Trapped particles on filter -->
    <circle cx="395" cy="163" r="2" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="415" cy="162" r="2" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
    <circle cx="450" cy="163" r="2" fill="url(#cross-hatch)" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Arrow 3 -->
  <g id="arrow-3">
    <line x1="490" y1="150" x2="530" y2="150" stroke="#000" stroke-width="1.5"/>
    <polygon points="530,150 525,145 525,155" fill="#000"/>
  </g>

  <!-- Barrier 3: Purification -->
  <g id="barrier-3">
    <rect x="540" y="100" width="120" height="100" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <text x="600" y="120" font-family="Mallard, Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">BARRIER 3</text>
    <text x="600" y="140" font-family="Mallard, Arial, sans-serif" font-size="11" text-anchor="middle" fill="#000">Purification</text>
    <text x="600" y="155" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">(Kill Pathogens)</text>

    <!-- Heat waves (stipple pattern for heat/energy) -->
    <rect x="550" y="165" width="100" height="25" fill="url(#stipple)" stroke="none"/>

    <!-- Flame icon (hatching for fire) -->
    <path d="M590,185 Q595,170 600,185 Q605,170 610,185" fill="none" stroke="#000" stroke-width="1.5"/>
  </g>

  <!-- Arrow 4 to safe water -->
  <g id="arrow-4">
    <line x1="660" y1="150" x2="700" y2="150" stroke="#000" stroke-width="1.5"/>
    <polygon points="700,150 695,145 695,155" fill="#000"/>
  </g>

  <!-- Final: Safe Water -->
  <g id="safe-water">
    <circle cx="735" cy="150" r="35" fill="url(#topo-lines)" stroke="#000" stroke-width="1.5"/>
    <circle cx="735" cy="150" r="25" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <text x="735" y="155" font-family="Mallard, Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#000">SAFE</text>
  </g>

  <!-- Effectiveness Table -->
  <g id="effectiveness-table">
    <text x="50" y="240" font-family="Mallard, Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Contaminant Removal Effectiveness:</text>

    <!-- Table header -->
    <rect x="50" y="250" width="700" height="25" fill="url(#gray-75)" stroke="#000" stroke-width="1.5"/>
    <text x="60" y="268" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Contaminant</text>
    <text x="250" y="268" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Sedimentation</text>
    <text x="400" y="268" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Filtration</text>
    <text x="550" y="268" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Purification</text>
    <text x="690" y="268" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Total</text>

    <!-- Row 1: Sediment -->
    <rect x="50" y="275" width="700" height="22" fill="#FFF" stroke="#000" stroke-width="0.5"/>
    <text x="60" y="291" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">Sediment/Dirt</text>
    <text x="280" y="291" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">80%</text>
    <text x="430" y="291" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">19%</text>
    <text x="580" y="291" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">1%</text>
    <rect x="675" y="278" width="60" height="16" fill="url(#gray-40)" stroke="#000" stroke-width="0.5"/>
    <text x="705" y="291" font-family="Mallard, Arial, sans-serif" font-size="10" font-weight="bold" fill="#000">100%</text>

    <!-- Row 2: Protozoa -->
    <rect x="50" y="297" width="700" height="22" fill="#FFF" stroke="#000" stroke-width="0.5"/>
    <text x="60" y="313" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">Protozoa (Giardia)</text>
    <text x="280" y="313" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">30%</text>
    <text x="430" y="313" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">60%</text>
    <text x="580" y="313" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">9.9%</text>
    <rect x="675" y="300" width="60" height="16" fill="url(#gray-50)" stroke="#000" stroke-width="0.5"/>
    <text x="705" y="313" font-family="Mallard, Arial, sans-serif" font-size="10" font-weight="bold" fill="#000">99.9%</text>

    <!-- Row 3: Bacteria -->
    <rect x="50" y="319" width="700" height="22" fill="#FFF" stroke="#000" stroke-width="0.5"/>
    <text x="60" y="335" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">Bacteria (E. coli)</text>
    <text x="280" y="335" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">5%</text>
    <text x="430" y="335" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">40%</text>
    <text x="580" y="335" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">54.9%</text>
    <rect x="675" y="322" width="60" height="16" fill="url(#gray-60)" stroke="#000" stroke-width="0.5"/>
    <text x="705" y="335" font-family="Mallard, Arial, sans-serif" font-size="10" font-weight="bold" fill="#000">99.9%</text>

    <!-- Row 4: Viruses -->
    <rect x="50" y="341" width="700" height="22" fill="#FFF" stroke="#000" stroke-width="0.5"/>
    <text x="60" y="357" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">Viruses (Hepatitis)</text>
    <text x="280" y="357" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">0%</text>
    <text x="430" y="357" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">10%</text>
    <text x="580" y="357" font-family="Mallard, Arial, sans-serif" font-size="10" fill="#000">89.9%</text>
    <rect x="675" y="344" width="60" height="16" fill="url(#gray-75)" stroke="#000" stroke-width="0.5"/>
    <text x="705" y="357" font-family="Mallard, Arial, sans-serif" font-size="10" font-weight="bold" fill="#000">99.9%</text>
  </g>

  <!-- Purification Methods Detail -->
  <g id="purification-methods">
    <text x="50" y="395" font-family="Mallard, Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Barrier 3 Methods:</text>

    <!-- Boiling -->
    <rect x="50" y="405" width="200" height="70" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <rect x="52" y="407" width="196" height="20" fill="url(#gray-50)" stroke="none"/>
    <text x="150" y="420" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">BOILING</text>
    <text x="150" y="440" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">Rolling boil 1 minute</text>
    <text x="150" y="455" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">(3 min above 6,500 ft)</text>
    <text x="150" y="468" font-family="Mallard, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Kills: 99.999% pathogens</text>

    <!-- Chemical -->
    <rect x="270" y="405" width="200" height="70" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <rect x="272" y="407" width="196" height="20" fill="url(#gray-60)" stroke="none"/>
    <text x="370" y="420" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">CHEMICAL</text>
    <text x="370" y="440" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">Iodine or chlorine</text>
    <text x="370" y="455" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">Wait 30+ minutes</text>
    <text x="370" y="468" font-family="Mallard, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Kills: 99.9% bacteria/viruses</text>

    <!-- UV Light -->
    <rect x="490" y="405" width="200" height="70" fill="#FFF" stroke="#000" stroke-width="1.5"/>
    <rect x="492" y="407" width="196" height="20" fill="url(#gray-25)" stroke="none"/>
    <text x="590" y="420" font-family="Mallard, Arial, sans-serif" font-size="11" font-weight="bold" text-anchor="middle" fill="#000">UV LIGHT</text>
    <text x="590" y="440" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">SteriPEN or sunlight</text>
    <text x="590" y="455" font-family="Mallard, Arial, sans-serif" font-size="9" text-anchor="middle" fill="#000">90 sec per liter</text>
    <text x="590" y="468" font-family="Mallard, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">Kills: 99.99% pathogens</text>
  </g>

  <!-- Safety Warning -->
  <g id="warning">
    <rect x="50" y="500" width="700" height="40" fill="#000" stroke="#000" stroke-width="1.5"/>
    <text x="400" y="525" font-family="Mallard, Arial, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" fill="#FFF">
      ⚠ WARNING: No single method is 100% effective. Multi-barrier approach recommended.
    </text>
  </g>

  <!-- Attribution footer -->
  <text x="400" y="570" font-family="Mallard, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">
    Technical-Kinetic Design | uDOS Knowledge Bank | Patterns: solid-black, gray-10/25/40/50/60/75/90, hatch, stipple, topo
  </text>
  <text x="400" y="585" font-family="Mallard, Arial, sans-serif" font-size="8" text-anchor="middle" fill="#000">
    Mallard Font | CC-BY-SA 4.0 | All tones via pattern density (no opacity manipulation)
  </text>
</svg>
