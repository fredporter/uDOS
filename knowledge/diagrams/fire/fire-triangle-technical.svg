<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 600"
     width="800"
     height="600">

  <title>Fire Triangle Diagram</title>
  <desc>A technical diagram illustrating the three essential elements for fire: Heat, Fuel, and Oxygen, and their interconnectedness in the combustion process.</desc>

  <defs>
    <!-- Mac OS System 1 Bitmap Pattern: Light Gray (12.5% density) -->
    <pattern id="gray-12" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#EDEDED"/>
      <path d="M0,0 L0,1 M4,0 L4,1 M0,4 L0,5 M4,4 L4,5" stroke="#000" stroke-width="1"/>
    </pattern>

    <!-- Mac OS System 1 Bitmap Pattern: Gray (25% density using diagonal lines) -->
    <pattern id="gray-25" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0 M-2,6 L6,-2 M2,10 L10,2" stroke="#000" stroke-width="0.5"/>
    </pattern>
    
    <!-- Mac OS System 1 Bitmap Pattern: Medium Gray (37.5% density using diagonal lines) -->
    <pattern id="gray-37" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,8 L8,0 M-4,4 L4,-4 M4,12 L12,4 M-2,6 L6,-2 M2,10 L10,2" stroke="#000" stroke-width="0.5"/>
    </pattern>

    <!-- Mac OS System 1 Bitmap Pattern: Medium Gray (50% density) -->
    <pattern id="gray-50" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <path d="M0,0 L4,0 L4,4 L0,4 Z M4,4 L8,4 L8,8 L4,8 Z" fill="#000"/>
    </pattern>

    <!-- Mac OS System 1 Bitmap Pattern: Dark Gray (75% density using diagonal lines) -->
    <pattern id="gray-75" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,0 L8,8 M8,0 L0,8 M0,4 L4,8 M4,0 L8,4 M-4,4 L4,-4 M4,12 L12,4" stroke="#000" stroke-width="0.5"/>
    </pattern>

    <!-- Texture Pattern: Crosshatch -->
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,0 L8,8 M8,0 L0,8" stroke="#000" stroke-width="0.3"/>
    </pattern>

    <!-- Texture Pattern: Diagonal Lines -->
    <pattern id="diagonal-lines" patternUnits="userSpaceOnUse" width="8" height="8">
      <path d="M0,0 L8,8 M-2,6 L2,10 M6,-2 L10,2" stroke="#000" stroke-width="0.5"/>
    </pattern>

    <!-- Marker for arrowheads -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>

    <!-- CoreUI style icons (simplified geometric forms) -->
    <!-- Icon: Heat (simplified radiating lines) -->
    <g id="icon-heat" stroke="#000" stroke-width="1.5" fill="none">
        <circle cx="0" cy="0" r="8"/>
        <line x1="0" y1="-10" x2="0" y2="-13"/>
        <line x1="0" y1="10" x2="0" y2="13"/>
        <line x1="-10" y1="0" x2="-13" y2="0"/>
        <line x1="10" y1="0" x2="13" y2="0"/>
    </g>
    <!-- Icon: Fuel (simplified barrel/container) -->
    <g id="icon-fuel" stroke="#000" stroke-width="1.5" fill="none">
        <rect x="-8" y="-10" width="16" height="20" rx="2" ry="2"/>
        <line x1="-8" y1="-5" x2="8" y2="-5"/>
        <line x1="-8" y1="5" x2="8" y2="5"/>
    </g>
    <!-- Icon: Oxygen (simplified atom/molecule) -->
    <g id="icon-oxygen" stroke="#000" stroke-width="1.5" fill="none">
        <circle cx="0" cy="0" r="8"/>
        <circle cx="0" cy="0" r="4"/>
        <line x1="-8" y1="0" x2="8" y2="0"/>
        <line x1="0" y1="-8" x2="0" y2="8"/>
    </g>
    <!-- Icon: Flame (for center emphasis) -->
    <g id="icon-flame" stroke="#000" stroke-width="2.5" fill="url(#crosshatch)">
        <path d="M0,-20 Q-15,-5 -5,0 Q-10,15 0,20 Q10,15 5,0 Q15,-5 0,-20 Z"/>
    </g>
    <!-- Icon: Settings (CoreUI style) -->
    <g id="icon-settings" stroke="#000" stroke-width="1.5" fill="none">
        <circle cx="0" cy="0" r="8"/>
        <line x1="-2" y1="-8" x2="2" y2="-8"/>
        <line x1="-2" y1="8" x2="2" y2="8"/>
        <line x1="-8" y1="-2" x2="-8" y2="2"/>
        <line x1="8" y1="-2" x2="8" y2="2"/>
        <circle cx="0" cy="0" r="3"/>
    </g>
  </defs>

  <!-- Background frame and content area -->
  <g id="background-frame">
    <rect x="20" y="20" width="760" height="560" fill="url(#gray-12)" stroke="#000" stroke-width="1.5"/>
    <rect x="30" y="30" width="740" height="540" fill="#FFF" stroke="#000" stroke-width="0.5"/>
  </g>

  <!-- Labels - Title and Description -->
  <g id="labels-header">
    <text x="400" y="65" text-anchor="middle" font-size="16" font-weight="bold" font-family="monospace">FIRE TRIANGLE</text>
    <text x="50" y="90" font-size="11" font-family="monospace">THE THREE ELEMENTS NEEDED FOR FIRE</text>
  </g>

  <!-- Primary Structure: Main triangle and nodes -->
  <g id="primary-structure">
    <!-- Triangle vertices (nodes) -->
    <circle cx="400" cy="200" r="50" stroke="#000" stroke-width="1.5" fill="url(#gray-25)"/> <!-- Heat node -->
    <circle cx="250" cy="450" r="50" stroke="#000" stroke-width="1.5" fill="url(#gray-25)"/> <!-- Fuel node -->
    <circle cx="550" cy="450" r="50" stroke="#000" stroke-width="1.5" fill="url(#gray-25)"/> <!-- Oxygen node -->

    <!-- Main triangle outline -->
    <path d="M400,200 L250,450 L550,450 Z" stroke="#000" stroke-width="1.5" fill="none"/>

    <!-- Central Flame Icon (Emphasis) -->
    <g transform="translate(400, 366.6)">
        <use href="#icon-flame"/>
    </g>
  </g>

  <!-- Details: Connecting lines and inner node elements -->
  <g id="details">
    <!-- Connecting Arrows -->
    <path d="M360,230 L280,420" stroke="#000" stroke-width="0.5" marker-end="url(#arrowhead)"/> <!-- Heat to Fuel -->
    <path d="M290,450 L510,450" stroke="#000" stroke-width="0.5" marker-end="url(#arrowhead)"/> <!-- Fuel to Oxygen -->
    <path d="M520,420 L440,230" stroke="#000" stroke-width="0.5" marker-end="url(#arrowhead)"/> <!-- Oxygen to Heat -->
    
    <!-- Inner circles for node icons -->
    <circle cx="400" cy="200" r="20" stroke="#000" stroke-width="0.5" fill="none"/>
    <circle cx="250" cy="450" r="20" stroke="#000" stroke-width="0.5" fill="none"/>
    <circle cx="550" cy="450" r="20" stroke="#000" stroke-width="0.5" fill="none"/>
  </g>

  <!-- Shading: Texture fills and subtle effects -->
  <g id="shading">
    <!-- Shading below the central flame using diagonal lines -->
    <rect x="350" y="380" width="100" height="20" fill="url(#diagonal-lines)" opacity="0.6" stroke="none"/>
  </g>

  <!-- Labels: Node and arrow labels -->
  <g id="labels-nodes">
    <text x="400" y="160" text-anchor="middle" font-size="11" font-family="monospace" aria-label="Label for Heat element">HEAT</text>
    <text x="250" y="490" text-anchor="middle" font-size="11" font-family="monospace" aria-label="Label for Fuel element">FUEL</text>
    <text x="550" y="490" text-anchor="middle" font-size="11" font-family="monospace" aria-label="Label for Oxygen element">OXYGEN</text>
    
    <!-- Arrow Labels -->
    <text x="315" y="325" text-anchor="start" font-size="9" font-style="italic" font-family="monospace" transform="rotate(-30 315 325)" aria-label="Reaction arrow label">REACTION</text>
    <text x="400" y="460" text-anchor="middle" font-size="9" font-style="italic" font-family="monospace" aria-label="Sustainment arrow label">SUSTAINMENT</text>
    <text x="485" y="325" text-anchor="end" font-size="9" font-style="italic" font-family="monospace" transform="rotate(30 485 325)" aria-label="Ignition arrow label">IGNITION</text>
  </g>

  <!-- Measurements: Example dimension lines -->
  <g id="measurements">
    <line x1="250" y1="470" x2="250" y2="500" stroke="#000" stroke-width="0.5" stroke-dasharray="4 2"/>
    <line x1="550" y1="470" x2="550" y2="500" stroke="#000" stroke-width="0.5" stroke-dasharray="4 2"/>
    <line x1="250" y1="485" x2="550" y2="485" stroke="#000" stroke-width="0.5"/>
    <text x="540" y="480" text-anchor="end" font-size="9" font-style="italic" font-family="monospace">300 UNITS</text>
  </g>

  <!-- Icons: CoreUI-style representations -->
  <g id="icons">
    <g transform="translate(400, 200)">
        <use href="#icon-heat"/>
    </g>
    <g transform="translate(250, 450)">
        <use href="#icon-fuel"/>
    </g>
    <g transform="translate(550, 450)">
        <use href="#icon-oxygen"/>
    </g>
    
    <!-- Small settings icon on the background frame -->
    <g transform="translate(740, 40)">
        <use href="#icon-settings"/>
    </g>
  </g>
</svg>