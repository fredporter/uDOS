<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 800 600"
     width="800"
     height="600">

  <title>The Fire Triangle</title>
  <desc>A hand-illustrative line-art diagram depicting the fire triangle. Three essential elements—Heat, Fuel, and Oxygen—are arranged at the vertices of an implied triangle, with a central 'FIRE' label. Heat is represented by stylized flames and radiating lines. Fuel is shown as stacked wood logs with detailed woodgrain and cross-contour shading. Oxygen is depicted as a swirling atmospheric field with the O₂ scientific label. All lines are black on white, with varying weights and textures to achieve a monochrome engraving aesthetic, featuring rounded line caps and joins.</desc>

  <g stroke-linecap="round" stroke-linejoin="round">

  <g id="background" opacity="0.4">
    <!-- Implied triangle lines connecting the elements, softened by opacity -->
    <path d="M400,240 C350,300 300,350 280,390" stroke="#000" stroke-width="0.8" fill="none"/>
    <path d="M400,240 C450,300 500,350 520,390" stroke="#000" stroke-width="0.8" fill="none"/>
    <path d="M340,450 C400,420 500,420 540,450" stroke="#000" stroke-width="0.8" fill="none"/>
  </g>

  <g id="midground" opacity="0.7">
    <!-- Leader lines for labels, slightly lighter than foreground elements -->
    <path d="M400,120 L400,140" stroke="#000" stroke-width="0.8" fill="none"/>
    <path d="M280,370 L300,385" stroke="#000" stroke-width="0.8" fill="none"/>
    <path d="M600,370 L580,385" stroke="#000" stroke-width="0.8" fill="none"/>
  </g>

  <g id="foreground">
    <!-- HEAT - Top element -->
    <g id="heat-element">
      <!-- Main flame contour -->
      <path d="M400,150 Q410,180 430,200 Q415,220 400,210 Q385,220 370,200 Q390,180 400,150 Z"
            stroke="#000" stroke-width="2.5" fill="none"/>
      <!-- Inner flame details -->
      <path d="M400,165 Q405,175 415,185 Q405,190 400,180 Q395,190 385,185 Q395,175 400,165"
            stroke="#000" stroke-width="1.5" fill="none"/>
      <path d="M400,175 Q403,180 408,185" stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M400,175 Q397,180 392,185" stroke="#000" stroke-width="0.8" fill="none"/>

      <!-- Wavy parallel lines for flame shading -->
      <path d="M390,195 C395,190 405,190 410,195" stroke="#000" stroke-width="0.4" fill="none"/>
      <path d="M388,200 C395,195 405,195 412,200" stroke="#000" stroke-width="0.4" fill="none"/>
      <path d="M386,205 C395,200 405,200 414,205" stroke="#000" stroke-width="0.4" fill="none"/>

      <!-- Stipple for flame base -->
      <circle cx="395" cy="205" r="0.6" fill="#000"/>
      <circle cx="405" cy="205" r="0.6" fill="#000"/>
      <circle cx="400" cy="210" r="0.6" fill="#000"/>

      <!-- Radiating heat lines -->
      <path d="M400,150 L400,120" stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M400,150 L420,130" stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M400,150 L380,130" stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M400,150 L435,145" stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M400,150 L365,145" stroke="#000" stroke-width="0.8" fill="none"/>
    </g>

    <!-- FUEL - Bottom-left element -->
    <g id="fuel-element">
      <!-- Log 1 (bottom) -->
      <path d="M220,450 C230,420 330,420 340,450 C330,480 230,480 220,450 Z"
            stroke="#000" stroke-width="2.5" fill="none"/>
      <!-- End grain -->
      <path d="M225,450 C228,445 235,445 238,450 C235,455 228,455 225,450 Z"
            stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M230,450 C233,447 236,447 239,450 C236,453 233,453 230,450 Z"
            stroke="#000" stroke-width="0.8" fill="none"/>
      <!-- Woodgrain texture for log 1 -->
      <path d="M240,445 Q260,440 280,445 Q300,450 320,445" stroke="#000" stroke-width="0.4" fill="none"/>
      <path d="M245,450 Q265,445 285,450 Q305,455 325,450" stroke="#000" stroke-width="0.4" fill="none"/>
      <path d="M250,455 Q270,450 290,455 Q310,460 330,455" stroke="#000" stroke-width="0.4" fill="none"/>
      <!-- Stipple for log 1 shading -->
      <circle cx="280" cy="460" r="0.6" fill="#000"/>
      <circle cx="290" cy="462" r="0.6" fill="#000"/>
      <circle cx="270" cy="465" r="0.6" fill="#000"/>

      <!-- Log 2 (top, slightly overlapping) -->
      <path d="M260,400 C270,370 370,370 380,400 C370,430 270,430 260,400 Z"
            stroke="#000" stroke-width="2.5" fill="none"/>
      <!-- End grain -->
      <path d="M265,400 C268,395 275,395 278,400 C275,405 268,405 265,400 Z"
            stroke="#000" stroke-width="0.8" fill="none"/>
      <path d="M270,400 C273,397 276,397 279,400 C276,403 273,403 270,400 Z"
            stroke="#000" stroke-width="0.8" fill="none"/>
      <!-- Woodgrain texture for log 2 -->
      <path d="M280,395 Q300,390 320,395 Q340,400 360,395" stroke="#000" stroke-width="0.4" fill="none"/>
      <path d="M285,400 Q305,395 325,400 Q345,405 365,400" stroke="#000" stroke-width="0.4" fill="none"/>
      <!-- Stipple for log 2 shading -->
      <circle cx="320" cy="410" r="0.6" fill="#000"/>
      <circle cx="330" cy="412" r="0.6" fill="#000"/>
      <circle cx="310" cy="415" r="0.6" fill="#000"/>
    </g>

    <!-- OXYGEN - Bottom-right element -->
    <g id="oxygen-element">
      <!-- Main cloud shape contour -->
      <path d="M540,450 Q520,400 560,380 Q600,370 640,380 Q680,400 660,450 Q630,460 600,450 Q570,440 540,450 Z"
            stroke="#000" stroke-width="1.5" fill="none"/>
      <!-- Concentric circular texture for gas/air -->
      <ellipse cx="600" cy="415" rx="50" ry="35" stroke="#000" stroke-width="0.4" fill="none"/>
      <ellipse cx="600" cy="415" rx="40" ry="28" stroke="#000" stroke-width="0.4" fill="none"/>
      <ellipse cx="600" cy="415" rx="30" ry="21" stroke="#000" stroke-width="0.4" fill="none"/>
      <ellipse cx="600" cy="415" rx="20" ry="14" stroke="#000" stroke-width="0.4" fill="none"/>
      <ellipse cx="600" cy="415" rx="10" ry="7" stroke="#000" stroke-width="0.4" fill="none"/>
    </g>
  </g>

  <g id="labels">
    <!-- Title text for the central concept -->
    <text x="400" y="300" text-anchor="middle"
          font-size="18" font-weight="bold" font-style="italic" font-family="serif">
      FIRE
    </text>
    <text x="400" y="325" text-anchor="middle"
          font-size="11" font-family="serif">
      (Combustion)
    </text>

    <!-- Labels for each element -->
    <text x="400" y="110" text-anchor="middle"
          font-size="11" font-family="serif">
      HEAT
    </text>

    <text x="280" y="360" text-anchor="middle"
          font-size="11" font-family="serif">
      FUEL
    </text>

    <text x="600" y="360" text-anchor="middle"
          font-size="11" font-family="serif">
      OXYGEN
    </text>

    <!-- Scientific notation for Oxygen with subscript -->
    <text x="600" y="420" text-anchor="middle"
          font-size="10" font-style="italic" font-family="serif">
      O<tspan dy="3" font-size="7">2</tspan>
    </text>
  </g>
  </g>
</svg>