<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">

  <defs>
    <!-- Grayscale Patterns -->
    <pattern id="gray-12" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="1" fill="#000"/>
    </pattern>

    <pattern id="gray-25" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#FFF"/>
      <rect x="0" y="0" width="2" height="2" fill="#000"/>
      <rect x="2" y="2" width="2" height="2" fill="#000"/>
    </pattern>

    <pattern id="gray-37" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="1" fill="#000"/>
      <rect x="2" y="2" width="1" height="1" fill="#000"/>
      <rect x="4" y="4" width="1" height="1" fill="#000"/>
      <rect x="6" y="6" width="1" height="1" fill="#000"/>
      <rect x="1" y="1" width="1" height="1" fill="#000"/>
      <rect x="3" y="3" width="1" height="1" fill="#000"/>
      <rect x="5" y="5" width="1" height="1" fill="#000"/>
      <rect x="7" y="7" width="1" height="1" fill="#000"/>
    </pattern>

    <pattern id="gray-50" patternUnits="userSpaceOnUse" width="2" height="2">
      <rect width="2" height="2" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="1" fill="#000"/>
      <rect x="1" y="1" width="1" height="1" fill="#000"/>
    </pattern>

    <pattern id="gray-62" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#000"/>
      <rect x="1" y="0" width="1" height="1" fill="#FFF"/>
      <rect x="3" y="2" width="1" height="1" fill="#FFF"/>
      <rect x="5" y="4" width="1" height="1" fill="#FFF"/>
      <rect x="7" y="6" width="1" height="1" fill="#FFF"/>
      <rect x="0" y="1" width="1" height="1" fill="#FFF"/>
      <rect x="2" y="3" width="1" height="1" fill="#FFF"/>
      <rect x="4" y="5" width="1" height="1" fill="#FFF"/>
      <rect x="6" y="7" width="1" height="1" fill="#FFF"/>
    </pattern>

    <pattern id="gray-75" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#000"/>
      <rect x="0" y="0" width="2" height="2" fill="#FFF"/>
      <rect x="2" y="2" width="2" height="2" fill="#FFF"/>
    </pattern>

    <!-- Texture Patterns -->
    <pattern id="brick" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="4" height="1" fill="#000"/>
      <rect x="4" y="1" width="1" height="3" fill="#000"/>
      <rect x="0" y="4" width="4" height="1" fill="#000"/>
      <rect x="0" y="5" width="1" height="3" fill="#000"/>
    </pattern>

    <pattern id="diagonal" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="1" fill="#000"/>
      <rect x="1" y="1" width="1" height="1" fill="#000"/>
      <rect x="2" y="2" width="1" height="1" fill="#000"/>
      <rect x="3" y="3" width="1" height="1" fill="#000"/>
      <rect x="4" y="4" width="1" height="1" fill="#000"/>
      <rect x="5" y="5" width="1" height="1" fill="#000"/>
      <rect x="6" y="6" width="1" height="1" fill="#000"/>
      <rect x="7" y="7" width="1" height="1" fill="#000"/>
    </pattern>

    <pattern id="cross-hatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="8" fill="#000"/>
      <rect x="0" y="0" width="8" height="1" fill="#000"/>
      <rect x="4" y="0" width="1" height="8" fill="#000"/>
      <rect x="0" y="4" width="8" height="1" fill="#000"/>
    </pattern>

    <pattern id="dots" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="1" fill="#000"/>
      <rect x="2" y="2" width="1" height="1" fill="#000"/>
    </pattern>

    <pattern id="horizontal" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="8" height="2" fill="#000"/>
      <rect x="0" y="4" width="8" height="2" fill="#000"/>
    </pattern>

    <pattern id="vertical" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="2" height="8" fill="#000"/>
      <rect x="4" y="0" width="2" height="8" fill="#000"/>
    </pattern>

    <pattern id="herringbone" patternUnits="userSpaceOnUse" width="8" height="8">
      <rect width="8" height="8" fill="#FFF"/>
      <rect x="0" y="0" width="1" height="1" fill="#000"/>
      <rect x="1" y="1" width="1" height="1" fill="#000"/>
      <rect x="2" y="2" width="1" height="1" fill="#000"/>
      <rect x="3" y="3" width="1" height="1" fill="#000"/>
      <rect x="7" y="0" width="1" height="1" fill="#000"/>
      <rect x="6" y="1" width="1" height="1" fill="#000"/>
      <rect x="5" y="2" width="1" height="1" fill="#000"/>
      <rect x="4" y="3" width="1" height="1" fill="#000"/>
      <rect x="0" y="7" width="1" height="1" fill="#000"/>
      <rect x="1" y="6" width="1" height="1" fill="#000"/>
      <rect x="2" y="5" width="1" height="1" fill="#000"/>
      <rect x="3" y="4" width="1" height="1" fill="#000"/>
      <rect x="7" y="7" width="1" height="1" fill="#000"/>
      <rect x="6" y="6" width="1" height="1" fill="#000"/>
      <rect x="5" y="5" width="1" height="1" fill="#000"/>
      <rect x="4" y="4" width="1" height="1" fill="#000"/>
    </pattern>
  </defs>

  
  <title>Compass Basics</title>
  <desc>Basic compass orientation and cardinal directions</desc>
  
  <text x="300" y="30" font-family="monospace" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#000">COMPASS BASICS</text>
  
  <!-- Compass circle -->
  <circle cx="300" cy="300" r="180" fill="#FFF" stroke="#000" stroke-width="3"/>
  <circle cx="300" cy="300" r="175" fill="none" stroke="#000" stroke-width="1"/>
  
  <!-- Cardinal directions -->
  <text x="300" y="140" font-family="monospace" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#000">N</text>
  <text x="300" y="475" font-family="monospace" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#000">S</text>
  <text x="470" y="310" font-family="monospace" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#000">E</text>
  <text x="130" y="310" font-family="monospace" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#000">W</text>
  
  <!-- Degree markings -->
  <text x="300" y="155" font-family="monospace" font-size="10" 
        text-anchor="middle" fill="#666">0°/360°</text>
  <text x="445" y="310" font-family="monospace" font-size="10" 
        text-anchor="middle" fill="#666">90°</text>
  <text x="300" y="460" font-family="monospace" font-size="10" 
        text-anchor="middle" fill="#666">180°</text>
  <text x="155" y="310" font-family="monospace" font-size="10" 
        text-anchor="middle" fill="#666">270°</text>
  
  <!-- Magnetic needle -->
  <polygon points="300,180 310,300 300,320 290,300" fill="#000" stroke="#000" stroke-width="2"/>
  <polygon points="300,320 310,300 300,420 290,300" fill="#FFF" stroke="#000" stroke-width="2"/>
  <circle cx="300" cy="300" r="8" fill="#000"/>
  
  <!-- Labels -->
  <text x="340" y="190" font-family="monospace" font-size="9" fill="#000">North-seeking</text>
  <text x="340" y="200" font-family="monospace" font-size="9" fill="#000">(Red/Black)</text>
  <text x="340" y="430" font-family="monospace" font-size="9" fill="#000">South-seeking</text>
  <text x="340" y="440" font-family="monospace" font-size="9" fill="#000">(White)</text>
  
  <!-- Instructions -->
  <rect x="20" y="510" width="560" height="80" fill="#E6E6E6" stroke="#000" stroke-width="1"/>
  <text x="30" y="530" font-family="monospace" font-size="10" font-weight="bold" fill="#000">HOW TO USE:</text>
  <text x="40" y="545" font-family="monospace" font-size="9" fill="#000">1. Hold compass flat and level</text>
  <text x="40" y="558" font-family="monospace" font-size="9" fill="#000">2. Rotate body until needle aligns with N (red to north)</text>
  <text x="40" y="571" font-family="monospace" font-size="9" fill="#000">3. Read bearing at direction of travel arrow</text>
  <text x="40" y="584" font-family="monospace" font-size="9" fill="#000">4. Adjust for magnetic declination (varies by location)</text>
  
</svg>