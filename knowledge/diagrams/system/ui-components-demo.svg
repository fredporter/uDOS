<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1200" width="900" height="1200">
  
  <!-- Title -->
  <text x="450" y="30" font-family="monospace" font-size="24" font-weight="bold" 
        text-anchor="middle" fill="#000">Mac OS System UI Components</text>
  <text x="450" y="50" font-family="monospace" font-size="12" 
        text-anchor="middle" fill="#000">Based on system.css and Apple HI Guidelines (1984-1991)</text>
  
  <line x1="50" y1="60" x2="850" y2="60" stroke="#000" stroke-width="1"/>
  
  <!-- SECTION 1: Buttons -->
  <text x="50" y="85" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Buttons</text>
  

  <!-- Button: Submit -->
  <g class="button">
    <rect x="50" y="95" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="79" y="109" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Submit</text>
  </g>
  <!-- Button: Cancel -->
  <g class="button">
    <rect x="120" y="95" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="149" y="109" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Cancel</text>
  </g>
  <!-- Button: Active -->
  <g class="button">
    <rect x="190" y="95" width="59" height="20" rx="8" ry="8" 
          fill="#000" stroke="#000" stroke-width="1"/>
    <text x="219" y="109" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#FFF">Active</text>
  </g>
  <!-- Button: Disabled -->
  <g class="button">
    <rect x="260" y="95" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="289" y="109" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#808080">Disabled</text>
  </g>
  <!-- Button: Find -->
  <g class="button">
    <rect x="340" y="95" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="369" y="109" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Find</text>
  </g>
  <!-- Button: Long Button Text -->
  <g class="button">
    <rect x="420" y="95" width="140" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="490" y="109" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Long Button Text</text>
  </g>
  
  <!-- SECTION 2: Form Elements -->
  <text x="50" y="145" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Form Elements</text>
  

  <!-- Checkbox: Enable feature -->
  <g class="checkbox">
    <rect x="50" y="155" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <line x1="52" y1="161" x2="55" y2="164" stroke="#000" stroke-width="2"/>
    <line x1="55" y1="164" x2="60" y2="157" stroke="#000" stroke-width="2"/>
    <text x="66" y="164" font-family="monospace" font-size="9" fill="#000">Enable feature</text>
  </g>
  <!-- Checkbox: Disabled option -->
  <g class="checkbox">
    <rect x="50" y="175" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="66" y="184" font-family="monospace" font-size="9" fill="#000">Disabled option</text>
  </g>
  <!-- Radio: Option A -->
  <g class="radio">
    <circle cx="206" cy="161" r="6" fill="#FFF" stroke="#000" stroke-width="1"/>
    <circle cx="206" cy="161" r="4" fill="#000"/>
    <text x="216" y="164" font-family="monospace" font-size="9" fill="#000">Option A</text>
  </g>
  <!-- Radio: Option B -->
  <g class="radio">
    <circle cx="206" cy="181" r="6" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="216" y="184" font-family="monospace" font-size="9" fill="#000">Option B</text>
  </g>
  <!-- Text Box -->
  <g class="text-box">
    <rect x="350" y="155" width="200" height="16" fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="354" y="166" font-family="monospace" font-size="9" fill="#808080">Enter text...</text>
  </g>
  <!-- Text Box -->
  <g class="text-box">
    <rect x="350" y="180" width="200" height="16" fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="354" y="191" font-family="monospace" font-size="9" fill="#000">User input here</text>
  </g>
  
  <!-- SECTION 3: Menu Bar -->
  <text x="50" y="225" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Menu Bar</text>
  

  <!-- Menu Bar -->
  <g class="menu-bar">
    <rect x="50" y="235" width="500" height="20" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="58" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#000">File</text>
    <text x="106" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#000">Edit</text>
    <text x="154" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#000">View</text>
    <text x="202" y="249" font-family="monospace" font-size="12" font-weight="bold" fill="#000">Special</text>
  </g>
  
  <!-- SECTION 4: Windows -->
  <text x="50" y="285" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Windows</text>
  

  <!-- Window: Active Window -->
  <g class="window">
    <!-- Window border -->
    <rect x="50" y="295" width="300" height="150" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="51" y="296" width="298" height="18" fill="#FFF" stroke="none"/>
    <line x1="51" y1="314" x2="349" y2="314" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="54" y1="298" x2="54" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="56" y1="298" x2="56" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="58" y1="298" x2="58" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="60" y1="298" x2="60" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="62" y1="298" x2="62" y2="311" stroke="#000" stroke-width="1"/>
    
    
    <rect x="57" y="300" width="9" height="9" fill="#FFF" stroke="#000" stroke-width="1"/>
    <rect x="59" y="302" width="5" height="5" fill="#000"/>
    
    <!-- Title text -->
    <text x="200" y="309" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Active Window</text>
    
    
    <rect x="51" y="314" width="298" height="130" fill="#FFF" stroke="none"/>
    <g transform="translate(56, 320)">
      <text x="0" y="15" font-family="monospace" font-size="9" fill="#000">This is window content.</text>
      <text x="0" y="30" font-family="monospace" font-size="9" fill="#000">Windows can contain text,</text>
      <text x="0" y="45" font-family="monospace" font-size="9" fill="#000">form elements, and more.</text>
    </g>
  </g>
  <!-- Window: With Details Bar -->
  <g class="window">
    <!-- Window border -->
    <rect x="400" y="295" width="300" height="150" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="401" y="296" width="298" height="18" fill="#FFF" stroke="none"/>
    <line x1="401" y1="314" x2="699" y2="314" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="404" y1="298" x2="404" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="406" y1="298" x2="406" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="408" y1="298" x2="408" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="410" y1="298" x2="410" y2="311" stroke="#000" stroke-width="1"/>
    <line x1="412" y1="298" x2="412" y2="311" stroke="#000" stroke-width="1"/>
    
    
    <rect x="407" y="300" width="9" height="9" fill="#FFF" stroke="#000" stroke-width="1"/>
    <rect x="409" y="302" width="5" height="5" fill="#000"/>
    
    <!-- Title text -->
    <text x="550" y="309" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">With Details Bar</text>
    
    <rect x="401" y="314" width="298" height="14" fill="#FFF" stroke="none"/>
    <line x1="401" y1="314" x2="699" y2="314" stroke="#000" stroke-width="1"/>
    <text x="406" y="324" font-family="monospace" font-size="9" fill="#000">details • more • info</text>
    
    <rect x="401" y="328" width="298" height="116" fill="#FFF" stroke="none"/>
    <g transform="translate(406, 334)">
      <text x="0" y="15" font-family="monospace" font-size="9" fill="#000">Content below details bar</text>
    </g>
  </g>
  

  <!-- Window: Inactive Window -->
  <g class="window">
    <!-- Window border -->
    <rect x="50" y="465" width="250" height="120" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="51" y="466" width="248" height="18" fill="#FFF" stroke="none"/>
    <line x1="51" y1="484" x2="299" y2="484" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="54" y1="468" x2="54" y2="481" stroke="#FFF" stroke-width="1"/>
    <line x1="56" y1="468" x2="56" y2="481" stroke="#FFF" stroke-width="1"/>
    <line x1="58" y1="468" x2="58" y2="481" stroke="#FFF" stroke-width="1"/>
    <line x1="60" y1="468" x2="60" y2="481" stroke="#FFF" stroke-width="1"/>
    <line x1="62" y1="468" x2="62" y2="481" stroke="#FFF" stroke-width="1"/>
    
    
    <rect x="57" y="470" width="9" height="9" fill="#FFF" stroke="#000" stroke-width="1"/>
    <rect x="59" y="472" width="5" height="5" fill="#000"/>
    
    <!-- Title text -->
    <text x="175" y="479" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Inactive Window</text>
    
    
    <rect x="51" y="484" width="248" height="100" fill="#FFF" stroke="none"/>
    <g transform="translate(56, 490)">
      <text x="0" y="15" font-family="monospace" font-size="9" fill="#808080">Inactive window state</text>
    </g>
  </g>
  
  <!-- SECTION 5: Dialogs -->
  <text x="50" y="615" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Dialogs</text>
  

  <!-- Window: Modeless Dialog -->
  <g class="window">
    <!-- Window border -->
    <rect x="50" y="625" width="320" height="140" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="51" y="626" width="318" height="18" fill="#FFF" stroke="none"/>
    <line x1="51" y1="644" x2="369" y2="644" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="54" y1="628" x2="54" y2="641" stroke="#000" stroke-width="1"/>
    <line x1="56" y1="628" x2="56" y2="641" stroke="#000" stroke-width="1"/>
    <line x1="58" y1="628" x2="58" y2="641" stroke="#000" stroke-width="1"/>
    <line x1="60" y1="628" x2="60" y2="641" stroke="#000" stroke-width="1"/>
    <line x1="62" y1="628" x2="62" y2="641" stroke="#000" stroke-width="1"/>
    
    
    <rect x="57" y="630" width="9" height="9" fill="#FFF" stroke="#000" stroke-width="1"/>
    <rect x="59" y="632" width="5" height="5" fill="#000"/>
    
    <!-- Title text -->
    <text x="210" y="639" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Modeless Dialog</text>
    
    
    <rect x="51" y="644" width="318" height="120" fill="#FFF" stroke="none"/>
    <g transform="translate(56, 650)">
      <text x="0" y="15" font-family="monospace" font-size="9" fill="#000">Find:</text>
      
  <!-- Text Box -->
  <g class="text-box">
    <rect x="0" y="25" width="220" height="16" fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="4" y="36" font-family="monospace" font-size="9" fill="#808080">Search term</text>
  </g>
  <!-- Button: Find -->
  <g class="button">
    <rect x="230" y="25" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="259" y="39" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Find</text>
  </g>
  <!-- Button: Cancel -->
  <g class="button">
    <rect x="165" y="25" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="194" y="39" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Cancel</text>
  </g>
    </g>
  </g>
  <!-- Modal Dialog: Modal Dialog -->
  <g class="modal-dialog">
    <!-- Outer border -->
    <rect x="420" y="625" width="350" height="180" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- Inner border and content -->
    <rect x="422" y="627" width="346" height="176" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar (simplified for dialog) -->
    <text x="595" y="641" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Modal Dialog</text>
    
    <line x1="423" y1="647" x2="767" y2="647" stroke="#000" stroke-width="1"/>
    
    <!-- Content -->
    <g transform="translate(430, 655)">
      <text x="0" y="15" font-family="monospace" font-size="9" fill="#000">Modal dialogs have double borders</text>
      <text x="0" y="30" font-family="monospace" font-size="9" fill="#000">and require user interaction.</text>
      
  <!-- Checkbox: Don't show this again -->
  <g class="checkbox">
    <rect x="0" y="50" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="16" y="59" font-family="monospace" font-size="9" fill="#000">Don't show this again</text>
  </g>
  <!-- Button: Cancel -->
  <g class="button">
    <rect x="190" y="90" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="219" y="104" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Cancel</text>
  </g>
  <!-- Button: OK -->
  <g class="button">
    <rect x="260" y="90" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="289" y="104" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">OK</text>
  </g>
    </g>
  </g>
  
  <!-- SECTION 6: Alert Boxes -->
  <text x="50" y="835" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Alert Boxes</text>
  

  <!-- Modal Dialog: Alert -->
  <g class="modal-dialog">
    <!-- Outer border -->
    <rect x="50" y="845" width="400" height="112" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- Inner border and content -->
    <rect x="52" y="847" width="396" height="108" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar (simplified for dialog) -->
    <text x="250" y="861" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Alert</text>
    
    <line x1="53" y1="867" x2="447" y2="867" stroke="#000" stroke-width="1"/>
    
    <!-- Content -->
    <g transform="translate(60, 875)">
      
      <rect x="10" y="0" width="32" height="32" fill="none" stroke="#000" stroke-width="1"/>
      <text x="50" y="10" font-family="monospace" font-size="9" fill="#000">This is a standard alert box.\nThe text would be placed here.\nThis is where more text appears.</text>
      
      
  <!-- Button: Cancel -->
  <g class="button">
    <rect x="222" y="22" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="251" y="36" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Cancel</text>
  </g>
  <!-- Button: OK -->
  <g class="button">
    <rect x="291" y="22" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="320" y="36" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">OK</text>
  </g>
    
    </g>
  </g>
  <!-- Modal Dialog: Alert -->
  <g class="modal-dialog">
    <!-- Outer border -->
    <rect x="480" y="845" width="360" height="112" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- Inner border and content -->
    <rect x="482" y="847" width="356" height="108" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar (simplified for dialog) -->
    <text x="660" y="861" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Alert</text>
    
    <line x1="483" y1="867" x2="837" y2="867" stroke="#000" stroke-width="1"/>
    
    <!-- Content -->
    <g transform="translate(490, 875)">
      
      <rect x="10" y="0" width="32" height="32" fill="none" stroke="#000" stroke-width="1"/>
      <text x="50" y="10" font-family="monospace" font-size="9" fill="#000">Are you sure you want to delete\nthis item? This action cannot\nbe undone.</text>
      
      
  <!-- Button: No -->
  <g class="button">
    <rect x="182" y="22" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="211" y="36" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">No</text>
  </g>
  <!-- Button: Yes -->
  <g class="button">
    <rect x="251" y="22" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="280" y="36" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Yes</text>
  </g>
    
    </g>
  </g>
  
  <!-- SECTION 7: Standard Dialog Example -->
  <text x="50" y="1015" font-family="monospace" font-size="16" font-weight="bold" fill="#000">Standard Dialog</text>
  

  <!-- Window: The Macintosh Finder, Version 1.0 (18 Jan 84) -->
  <g class="window">
    <!-- Window border -->
    <rect x="50" y="1025" width="400" height="150" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="51" y="1026" width="398" height="18" fill="#FFF" stroke="none"/>
    <line x1="51" y1="1044" x2="449" y2="1044" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="54" y1="1028" x2="54" y2="1041" stroke="#000" stroke-width="1"/>
    <line x1="56" y1="1028" x2="56" y2="1041" stroke="#000" stroke-width="1"/>
    <line x1="58" y1="1028" x2="58" y2="1041" stroke="#000" stroke-width="1"/>
    <line x1="60" y1="1028" x2="60" y2="1041" stroke="#000" stroke-width="1"/>
    <line x1="62" y1="1028" x2="62" y2="1041" stroke="#000" stroke-width="1"/>
    
    
    <rect x="57" y="1030" width="9" height="9" fill="#FFF" stroke="#000" stroke-width="1"/>
    <rect x="59" y="1032" width="5" height="5" fill="#000"/>
    
    <!-- Title text -->
    <text x="250" y="1039" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">The Macintosh Finder, Version 1.0 (18 Jan 84)</text>
    
    
    <rect x="51" y="1044" width="398" height="130" fill="#FFF" stroke="none"/>
    <g transform="translate(56, 1050)">
      <text x="120" y="35" font-family="monospace" font-size="9" text-anchor="middle" fill="#000">© 1984 Apple Computer</text>
    </g>
  </g>
  
  <!-- Footer -->
  <line x1="50" y1="1190" x2="850" y2="1190" stroke="#000" stroke-width="1"/>
  <text x="450" y="1210" font-family="monospace" font-size="9" 
        text-anchor="middle" fill="#000">All components pixel-perfect SVG • Monochrome only • Generic monospace fonts</text>
  
</svg>