<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style type="text/css">
      .line {
        stroke: black;
        stroke-width: 2;
        fill: none;
      }
      .label {
        font-family: Arial, sans-serif;
        font-size: 16px;
        fill: black;
      }
      .small-label {
        font-family: Arial, sans-serif;
        font-size: 12px;
        fill: black;
      }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="black" />
    </marker>
  </defs>

  <!-- Main Diagram Group -->
  <g>
    <!-- Outer Walls (perimeter with entrance gap) -->
    <path class="line" d="
      M 70 70    L 370 70
      L 370 270
      L 70 270
      L 70 230   M 70 110 L 70 70
    "/>

    <!-- Entry Funnel -->
    <path class="line" d="
      M 70 110 L 170 175
      M 70 230 L 170 185
    "/>

    <!-- Labels -->
    <text x="200" y="40" text-anchor="middle" class="label">Fish Trap Construction</text>

    <!-- Holding Chamber Label -->
    <text x="270" y="160" text-anchor="middle" class="label">Holding Chamber</text>
    <line x1="270" y1="170" x2="270" y2="220" class="line" marker-end="url(#arrowhead)" />

    <!-- Entry Funnel Label -->
    <text x="120" y="90" text-anchor="middle" class="label">Entry Funnel</text>
    <line x1="120" y1="100" x2="120" y2="140" class="line" marker-end="url(#arrowhead)" />

    <!-- Trap Entrance Label -->
    <text x="120" y="210" text-anchor="middle" class="label">Trap Entrance</text>
    <line x1="120" y1="220" x2="90" y2="220" class="line" marker-end="url(#arrowhead)" />

    <!-- Funnel Opening Label -->
    <text x="200" y="200" text-anchor="middle" class="label">Funnel Opening</text>
    <line x1="200" y1="190" x2="175" y2="180" class="line" marker-end="url(#arrowhead)" />

    <!-- Fish Entry Indicator -->
    <line x1="40" y1="170" x2="60" y2="170" class="line" marker-end="url(#arrowhead)" />
    <text x="35" y="160" text-anchor="end" class="small-label">Fish Entry</text>

  </g>
</svg>