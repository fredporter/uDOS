<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line {
        stroke: black;
        stroke-width: 2;
        fill: none;
      }
      .label {
        font-family: "Arial", sans-serif;
        font-size: 16px;
        font-weight: bold;
        fill: black;
        text-anchor: middle;
      }
    </style>
  </defs>

  <!-- Triangle Vertices (calculated for centering and side length 250):
       P1: Top (200, 55.67)
       P2: Bottom-left (75, 272.17)
       P3: Bottom-right (325, 272.17)
  -->
  
  <!-- Main equilateral triangle -->
  <path class="line" d="M 200 55.67 L 75 272.17 L 325 272.17 Z" />

  <!-- Subtle connecting elements at corners (15px lines extending outwards) -->
  <!-- From P1 (top) upwards -->
  <line class="line" x1="200" y1="55.67" x2="200" y2="40.67" />
  <!-- From P2 (bottom-left) downwards-left -->
  <line class="line" x1="75" y1="272.17" x2="62.01" y2="279.67" />
  <!-- From P3 (bottom-right) downwards-right -->
  <line class="line" x1="325" y1="272.17" x2="337.99" y2="279.67" />

  <!-- Labels -->
  <!-- OXYGEN (bottom side) -->
  <text class="label" x="200" y="292.17">OXYGEN</text>

  <!-- FUEL (left side)
       Calculations for placement:
       Midpoint of P2-P1: (137.5, 163.92)
       Line angle (P2 to P1): -60 degrees
       Text anchor point (x,y) for middle, 20px offset outward perpendicular to the side: (120.18, 153.92)
       Rotation for readability: -60 degrees
  -->
  <text class="label" x="120.18" y="153.92" transform="rotate(-60 120.18 153.92)">FUEL</text>

  <!-- HEAT (right side)
       Calculations for placement:
       Midpoint of P3-P1: (262.5, 163.92)
       Line angle (P3 to P1): -120 degrees
       Text anchor point (x,y) for middle, 20px offset outward perpendicular to the side: (279.82, 153.92)
       Rotation for readability: 60 degrees (original -120 + 180)
  -->
  <text class="label" x="279.82" y="153.92" transform="rotate(60 279.82 153.92)">HEAT</text>

</svg>