<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  
  <title>Emergency Shelter Setup Checklist</title>
  <desc>Shelter building checklist using Mac OS dialog interface</desc>
  
  <!-- Title -->
  <text x="400" y="30" font-family="monospace" font-size="20" font-weight="bold" 
        text-anchor="middle" fill="#000">EMERGENCY SHELTER - SETUP CHECKLIST</text>
  

  <!-- Window: Shelter Location Checklist -->
  <g class="window">
    <!-- Window border -->
    <rect x="50" y="60" width="700" height="250" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="51" y="61" width="698" height="18" fill="#FFF" stroke="none"/>
    <line x1="51" y1="79" x2="749" y2="79" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="54" y1="63" x2="54" y2="76" stroke="#000" stroke-width="1"/>
    <line x1="56" y1="63" x2="56" y2="76" stroke="#000" stroke-width="1"/>
    <line x1="58" y1="63" x2="58" y2="76" stroke="#000" stroke-width="1"/>
    <line x1="60" y1="63" x2="60" y2="76" stroke="#000" stroke-width="1"/>
    <line x1="62" y1="63" x2="62" y2="76" stroke="#000" stroke-width="1"/>
    
    
    <rect x="57" y="65" width="9" height="9" fill="#FFF" stroke="#000" stroke-width="1"/>
    <rect x="59" y="67" width="5" height="5" fill="#000"/>
    
    <!-- Title text -->
    <text x="400" y="74" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Shelter Location Checklist</text>
    
    <rect x="51" y="79" width="698" height="14" fill="#FFF" stroke="none"/>
    <line x1="51" y1="79" x2="749" y2="79" stroke="#000" stroke-width="1"/>
    <text x="56" y="89" font-family="monospace" font-size="9" fill="#000">Priority: Location is 60% of shelter success</text>
    
    <rect x="51" y="93" width="698" height="216" fill="#FFF" stroke="none"/>
    <g transform="translate(56, 99)">
      
      <text x="0" y="15" font-family="monospace" font-size="11" font-weight="bold" fill="#000">CRITICAL - Check ALL before building:</text>
      
  <!-- Checkbox: High ground (avoid flash floods) -->
  <g class="checkbox">
    <rect x="10" y="35" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <line x1="12" y1="41" x2="15" y2="44" stroke="#000" stroke-width="2"/>
    <line x1="15" y1="44" x2="20" y2="37" stroke="#000" stroke-width="2"/>
    <text x="26" y="44" font-family="monospace" font-size="9" fill="#000">High ground (avoid flash floods)</text>
  </g>
  <!-- Checkbox: Near water source (but not too close) -->
  <g class="checkbox">
    <rect x="10" y="55" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <line x1="12" y1="61" x2="15" y2="64" stroke="#000" stroke-width="2"/>
    <line x1="15" y1="64" x2="20" y2="57" stroke="#000" stroke-width="2"/>
    <text x="26" y="64" font-family="monospace" font-size="9" fill="#000">Near water source (but not too close)</text>
  </g>
  <!-- Checkbox: Wind protection (natural windbreak) -->
  <g class="checkbox">
    <rect x="10" y="75" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="26" y="84" font-family="monospace" font-size="9" fill="#000">Wind protection (natural windbreak)</text>
  </g>
  <!-- Checkbox: No dead trees overhead (widowmakers) -->
  <g class="checkbox">
    <rect x="10" y="95" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="26" y="104" font-family="monospace" font-size="9" fill="#000">No dead trees overhead (widowmakers)</text>
  </g>
  <!-- Checkbox: Flat, dry ground for sleeping -->
  <g class="checkbox">
    <rect x="10" y="115" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="26" y="124" font-family="monospace" font-size="9" fill="#000">Flat, dry ground for sleeping</text>
  </g>
  <!-- Checkbox: Materials available nearby -->
  <g class="checkbox">
    <rect x="10" y="135" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="26" y="144" font-family="monospace" font-size="9" fill="#000">Materials available nearby</text>
  </g>
  <!-- Checkbox: Not in animal trails/dens -->
  <g class="checkbox">
    <rect x="350" y="35" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="366" y="44" font-family="monospace" font-size="9" fill="#000">Not in animal trails/dens</text>
  </g>
  <!-- Checkbox: Reasonable sun exposure -->
  <g class="checkbox">
    <rect x="350" y="55" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="366" y="64" font-family="monospace" font-size="9" fill="#000">Reasonable sun exposure</text>
  </g>
  <!-- Checkbox: Drainage away from site -->
  <g class="checkbox">
    <rect x="350" y="75" width="12" height="12" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <text x="366" y="84" font-family="monospace" font-size="9" fill="#000">Drainage away from site</text>
  </g>
  <!-- Button: Reset -->
  <g class="button">
    <rect x="450" y="165" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="1"/>
    <text x="479" y="179" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Reset</text>
  </g>
  <!-- Button: Continue -->
  <g class="button">
    <rect x="520" y="165" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="549" y="179" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Continue</text>
  </g>
    </g>
  </g>


  <!-- Window: Build Priority -->
  <g class="window">
    <!-- Window border -->
    <rect x="50" y="330" width="340" height="160" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar -->
    <rect x="51" y="331" width="338" height="18" fill="#FFF" stroke="none"/>
    <line x1="51" y1="349" x2="389" y2="349" stroke="#000" stroke-width="1"/>
    
    <!-- Racing stripes -->
    <line x1="54" y1="333" x2="54" y2="346" stroke="#000" stroke-width="1"/>
    <line x1="56" y1="333" x2="56" y2="346" stroke="#000" stroke-width="1"/>
    <line x1="58" y1="333" x2="58" y2="346" stroke="#000" stroke-width="1"/>
    <line x1="60" y1="333" x2="60" y2="346" stroke="#000" stroke-width="1"/>
    <line x1="62" y1="333" x2="62" y2="346" stroke="#000" stroke-width="1"/>
    
    
    
    <!-- Title text -->
    <text x="220" y="344" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Build Priority</text>
    
    
    <rect x="51" y="349" width="338" height="140" fill="#FFF" stroke="none"/>
    <g transform="translate(56, 355)">
      
      <text x="0" y="15" font-family="monospace" font-size="10" font-weight="bold" fill="#000">Build in this order:</text>
      <text x="10" y="35" font-family="monospace" font-size="9" fill="#000">1. Ground insulation (6in debris)</text>
      <text x="10" y="50" font-family="monospace" font-size="9" fill="#000">2. Framework (ridgepole + ribs)</text>
      <text x="10" y="65" font-family="monospace" font-size="9" fill="#000">3. Thatching (thick, shingled)</text>
      <text x="10" y="80" font-family="monospace" font-size="9" fill="#000">4. Windbreak at entrance</text>
      <text x="10" y="95" font-family="monospace" font-size="9" fill="#000">5. Drainage trench (if rain)</text>
      
  <!-- Button: OK -->
  <g class="button">
    <rect x="165" y="105" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="194" y="119" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">OK</text>
  </g>
    </g>
  </g>
  <!-- Modal Dialog: Alert -->
  <g class="modal-dialog">
    <!-- Outer border -->
    <rect x="410" y="330" width="340" height="112" fill="none" stroke="#000" stroke-width="1"/>
    
    <!-- Inner border and content -->
    <rect x="412" y="332" width="336" height="108" fill="#FFF" stroke="#000" stroke-width="1"/>
    
    <!-- Title bar (simplified for dialog) -->
    <text x="580" y="346" 
          font-family="monospace" font-size="12" font-weight="bold"
          text-anchor="middle" fill="#000">Alert</text>
    
    <line x1="413" y1="352" x2="747" y2="352" stroke="#000" stroke-width="1"/>
    
    <!-- Content -->
    <g transform="translate(420, 360)">
      
      <rect x="10" y="0" width="32" height="32" fill="none" stroke="#000" stroke-width="1"/>
      <text x="50" y="10" font-family="monospace" font-size="9" fill="#000">RULE OF THREES\n3 hours without shelter (cold)\n3 days without water\n3 weeks without food</text>
      
      
  <!-- Button: Got it -->
  <g class="button">
    <rect x="231" y="22" width="59" height="20" rx="8" ry="8" 
          fill="#FFF" stroke="#000" stroke-width="3"/>
    <text x="260" y="36" 
          font-family="monospace" font-size="11" 
          text-anchor="middle" fill="#000">Got it</text>
  </g>
    
    </g>
  </g>

</svg>