<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* Global styles for main structural lines */
      .line {
        stroke: black;
        stroke-width: 2;
        fill: none;
      }
      /* Styles for labels */
      .label {
        font-family: Arial, sans-serif;
        font-size: 14px;
        fill: black;
        stroke: none;
      }
      /* Styles for leader lines, typically thinner than main lines */
      .leader-line {
        stroke: black;
        stroke-width: 1;
        fill: none;
      }
    </style>
  </defs>

  <!-- Ground Line -->
  <line x1="30" y1="350" x2="370" y2="350" class="line"/>

  <!-- Insulation Layer (Outer shell of debris) -->
  <!-- This path defines the overall shape and bulk of the debris hut, enveloping the internal frame. -->
  <path d="M 40 350 L 200 30 L 360 350" class="line"/>

  <!-- Ridge Pole (Main horizontal structural beam at the peak) -->
  <line x1="100" y1="70" x2="300" y2="70" class="line"/>

  <!-- Frame/Ribbing (Rafters extending from the ridge pole down to the ground) -->
  <!-- These lines represent the underlying stick or branch framework. -->
  <line x1="100" y1="70" x2="50" y2="350" class="line"/>
  <line x1="150" y1="70" x2="90" y2="350" class="line"/>
  <line x1="200" y1="70" x2="130" y2="350" class="line"/>

  <line x1="300" y1="70" x2="350" y2="350" class="line"/>
  <line x1="250" y1="70" x2="310" y2="350" class="line"/>
  <line x1="200" y1="70" x2="270" y2="350" class="line"/>

  <!-- Entrance (Arched opening on one side of the hut) -->
  <!-- This path creates an outline of an arched doorway cutting into the insulation layer. -->
  <path d="M 70 350 L 70 260 A 20 20 0 0 1 90 240 L 110 240 A 20 20 0 0 1 130 260 L 130 350" class="line"/>

  <!-- Labels and Leader Lines -->

  <!-- Ridge Pole Label -->
  <text x="200" y="55" text-anchor="middle" class="label">Ridge Pole</text>
  <line x1="200" y1="60" x2="200" y2="70" class="leader-line"/>

  <!-- Insulation (debris) Label -->
  <text x="320" y="100" text-anchor="start" class="label">Insulation (debris)</text>
  <line x1="315" y1="105" x2="300" y2="120" class="leader-line"/>
  <line x1="300" y1="120" x2="280" y2="135" class="leader-line"/>
  <line x1="280" y1="135" x2="250" y2="150" class="leader-line"/>

  <!-- Frame/Ribbing Label -->
  <text x="80" y="150" text-anchor="end" class="label">Frame/Ribbing</text>
  <line x1="85" y1="155" x2="105" y2="170" class="leader-line"/>
  <line x1="105" y1="170" x2="125" y2="185" class="leader-line"/>
  <line x1="125" y1="185" x2="150" y2="200" class="leader-line"/>

  <!-- Entrance Label -->
  <text x="100" y="225" text-anchor="middle" class="label">Entrance</text>
  <line x1="100" y1="230" x2="100" y2="240" class="leader-line"/>

</svg>