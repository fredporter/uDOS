<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .line-style {
        stroke: black;
        stroke-width: 2;
        fill: none;
      }
      .text-style {
        font-family: Arial, sans-serif;
        font-size: 14px;
        fill: black;
      }
    </style>
  </defs>

  <!-- Ground -->
  <line x1="50" y1="350" x2="350" y2="350" class="line-style" />
  <text x="50" y="365" class="text-style">Ground</text>

  <!-- Lean-to Structure -->
  <!-- Back Support Pole -->
  <line x1="50" y1="150" x2="50" y2="350" class="line-style" />
  <!-- Front Support Pole -->
  <line x1="250" y1="200" x2="250" y2="350" class="line-style" />
  <text x="255" y="340" class="text-style">Support Pole</text>

  <!-- Roof (represented by parallel lines for thickness in side view) -->
  <line x1="50" y1="150" x2="250" y2="200" class="line-style" /> <!-- Top edge -->
  <line x1="50" y1="160" x2="250" y2="210" class="line-style" /> <!-- Bottom edge -->
  <line x1="50" y1="150" x2="50" y2="160" class="line-style" /> <!-- Back connector -->
  <line x1="250" y1="200" x2="250" y2="210" class="line-style" /> <!-- Front connector -->
  <text x="100" y="140" class="text-style">Lean-to Roof</text>

  <!-- Reflector Wall -->
  <rect x="290" y="260" width="40" height="90" class="line-style" />
  <text x="335" y="315" class="text-style">Reflector Wall</text>

  <!-- Fire Placement -->
  <!-- Logs/Base -->
  <line x1="270" y1="340" x2="310" y2="340" class="line-style" />
  <!-- Flame representation -->
  <polygon points="290,340 280,320 290,310 300,320 290,340" class="line-style" />
  <text x="270" y="300" class="text-style">Fire</text>

</svg>