<svg width="1000" height="600" viewBox="0 0 1000 600" xmlns="http://www.w3.org/2000/svg" style="background-color:#FFFFFF;">
  <defs>
    <!-- Pattern 1: Hatching (diagonal lines) -->
    <pattern id="hatchPattern" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#000000" stroke-width="1.5"/>
    </pattern>

    <!-- Pattern 2: Stipple (dots) -->
    <pattern id="stipplePattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <circle cx="1" cy="1" r="0.5" fill="#000000"/>
    </pattern>

    <!-- Pattern 3: Wavy lines -->
    <pattern id="wavyPattern" patternUnits="userSpaceOnUse" width="10" height="10">
      <path d="M0,5 C2.5,2.5 7.5,7.5 10,5" stroke="#000000" stroke-width="1.5" fill="none"/>
    </pattern>

    <!-- Pattern 4: Fine Stipple (for treated water, less dense) -->
    <pattern id="fineStipplePattern" patternUnits="userSpaceOnUse" width="8" height="8">
      <circle cx="1" cy="1" r="0.4" fill="#000000"/>
    </pattern>
  </defs>

  <!-- Global Stroke Width -->
