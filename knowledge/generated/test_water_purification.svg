<svg width="800" height="500" viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg" style="background-color:#FFFFFF;">
  <defs>
    <pattern id="hatchPattern" patternUnits="userSpaceOnUse" width="10" height="10" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="10" stroke="#000000" stroke-width="1.5"/>
    </pattern>
    <pattern id="dotPattern" patternUnits="userSpaceOnUse" width="6" height="6">
      <circle cx="3" cy="3" r="1" fill="#000000"/>
    </pattern>
    <pattern id="wavePattern" patternUnits="userSpaceOnUse" width="12" height="8">
      <path d="M0,4 Q3,1 6,4 T12,4" stroke="#000000" stroke-width="1" fill="none"/>
    </pattern>
  </defs>
  <g stroke="#000000" stroke-width="2">
    <text x="400" y="30" text-anchor="middle" font-family="monospace" font-size="18" font-weight="bold" fill="#000000">WATER PURIFICATION SYSTEM</text>
    <rect x="50" y="100" width="120" height="80" fill="url(#wavePattern)" stroke="#000000" stroke-width="2.5"/>
    <text x="110" y="95" text-anchor="middle" font-family="monospace" font-size="10" fill="#000000">SOURCE</text>
    <text x="110" y="155" text-anchor="middle" font-family="monospace" font-size="9" fill="#000000">Contaminated</text>
    <line x1="170" y1="140" x2="230" y2="140" stroke="#000000" stroke-width="3"/>
    <polygon points="230,135 240,140 230,145" fill="#000000"/>
    <rect x="250" y="110" width="80" height="60" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
    <circle cx="290" cy="140" r="25" fill="none" stroke="#000000" stroke-width="2"/>
    <circle cx="290" cy="140" r="5" fill="#000000"/>
    <line x1="290" y1="115" x2="290" y2="125" stroke="#000000" stroke-width="2"/>
    <line x1="290" y1="155" x2="290" y2="165" stroke="#000000" stroke-width="2"/>
    <line x1="265" y1="140" x2="275" y2="140" stroke="#000000" stroke-width="2"/>
    <line x1="305" y1="140" x2="315" y2="140" stroke="#000000" stroke-width="2"/>
    <text x="290" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#000000">FILTER</text>
    <line x1="330" y1="140" x2="390" y2="140" stroke="#000000" stroke-width="3"/>
    <polygon points="390,135 400,140 390,145" fill="#000000"/>
    <rect x="410" y="110" width="80" height="60" fill="url(#hatchPattern)" stroke="#000000" stroke-width="2.5"/>
    <path d="M425,145 L430,135 L435,145 L440,130 L445,145 L450,135 L455,145" stroke="#000000" stroke-width="1.5" fill="none"/>
    <circle cx="465" cy="145" r="8" fill="none" stroke="#000000" stroke-width="2"/>
    <text x="450" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#000000">BOIL</text>
    <text x="450" y="195" text-anchor="middle" font-family="monospace" font-size="8" fill="#000000">100°C / 1 min</text>
    <line x1="490" y1="140" x2="550" y2="140" stroke="#000000" stroke-width="3"/>
    <polygon points="550,135 560,140 550,145" fill="#000000"/>
    <rect x="570" y="110" width="80" height="60" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
    <rect x="595" y="125" width="30" height="30" fill="url(#dotPattern)" stroke="#000000" stroke-width="2"/>
    <line x1="605" y1="115" x2="615" y2="115" stroke="#000000" stroke-width="3"/>
    <circle cx="610" cy="110" r="4" fill="#000000"/>
    <text x="610" y="105" text-anchor="middle" font-family="monospace" font-size="10" fill="#000000">CHEMICAL</text>
    <line x1="650" y1="140" x2="710" y2="140" stroke="#000000" stroke-width="3"/>
    <polygon points="710,135 720,140 710,145" fill="#000000"/>
    <circle cx="740" cy="140" r="20" fill="#FFFFFF" stroke="#000000" stroke-width="2.5"/>
    <text x="740" y="145" text-anchor="middle" font-family="monospace" font-size="12" fill="#000000">✓</text>
    <text x="740" y="185" text-anchor="middle" font-family="monospace" font-size="9" fill="#000000">SAFE</text>
    <text x="50" y="250" font-family="monospace" font-size="11" font-weight="bold" fill="#000000">METHODS:</text>
    <rect x="50" y="260" width="15" height="15" fill="url(#wavePattern)" stroke="#000000"/>
    <text x="75" y="272" font-family="monospace" font-size="9" fill="#000000">1. Physical Filtration</text>
    <rect x="50" y="285" width="15" height="15" fill="url(#hatchPattern)" stroke="#000000"/>
    <text x="75" y="297" font-family="monospace" font-size="9" fill="#000000">2. Heat Treatment (Boiling)</text>
    <rect x="50" y="310" width="15" height="15" fill="url(#dotPattern)" stroke="#000000"/>
    <text x="75" y="322" font-family="monospace" font-size="9" fill="#000000">3. Chemical Disinfection</text>
    <text x="400" y="250" font-family="monospace" font-size="11" font-weight="bold" fill="#000000">SPECIFICATIONS:</text>
    <text x="400" y="270" font-family="monospace" font-size="9" fill="#000000">Filter: 0.2-5μm pore size</text>
    <text x="400" y="290" font-family="monospace" font-size="9" fill="#000000">Boil: 100°C minimum 1 minute</text>
    <text x="400" y="310" font-family="monospace" font-size="9" fill="#000000">Chemical: Per manufacturer specs</text>
    <rect x="10" y="10" width="780" height="480" fill="none" stroke="#000000" stroke-width="3"/>
    <rect x="15" y="15" width="770" height="470" fill="none" stroke="#000000" stroke-width="1"/>
  </g>
</svg>
