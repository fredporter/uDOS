filetype: udos-markdown

detect:
    filename: "\\.md$"
    header: "^\\s*#\\s+"

rules:
    # uDOS Shortcodes
    - special: "\\[([A-Z|]+)\\]"
    - special: "\\[([A-Z|]+)\\|([^\\]]+)\\]"
    
    # uDOS Template Variables
    - identifier.var: "\\{\\{[A-Z_]+\\}\\}"
    - identifier.var: "\\{\\{[A-Z_]+:[^}]+\\}\\}"
    - identifier.var: "\\{\\{INPUT:[^}]+\\}\\}"
    - identifier.var: "\\{\\{CUSTOM:[^}]+\\}\\}"
    
    # Headers
    - identifier: "^#{1,6}\\s+.*$"
    
    # Bold
    - statement: "(\\*\\*|__)(?=\\S)(.*?[*_]*)(?<=\\S)\\1"
    
    # Italic
    - statement: "(\\*|_)(?=\\S)(.*?)(?<=\\S)\\1"
    
    # Code blocks
    - comment:
        start: "```"
        end: "```"
        rules: []
    
    # Inline code
    - comment: "`[^`]*`"
    
    # Links
    - constant.string: "\\[([^\\]]*)\\]\\(([^)]*)\\)"
    
    # Images
    - constant.string: "!\\[([^\\]]*)\\]\\(([^)]*)\\)"
    
    # Lists
    - symbol: "^\\s*[*+-]\\s+"
    - symbol: "^\\s*[0-9]+\\.\\s+"
    
    # Blockquotes
    - comment: "^>.*$"
    
    # Horizontal rules
    - symbol: "^\\s*[-*_]{3,}\\s*$"
    
    # ASCII Art (uDOS specific)
    - comment:
        start: "```ascii"
        end: "```"
        rules: []
    
    # Tables
    - symbol: "\\|"
    
    # HTML tags
    - identifier.class: "<[^>]+>"
