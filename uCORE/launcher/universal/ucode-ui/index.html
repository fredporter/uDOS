<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>uDOS - BBC Mode 7 Interface</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        /* Proper BBC Mode 7 Font Aspect Ratio */
        body {
            margin: 0;
            padding: 20px;
            background: #000;
            color: #fff;
            font-family: 'MODE7GX3', 'Courier New', monospace;
            font-size: 20px;
            line-height: 1.0;
            transform: scaleY(1.3); /* Correct BBC Mode 7 character aspect ratio */
            transform-origin: top;
            overflow-x: auto;
        }
        
        /* Clean Mode 7 Container */
        .mode7-interface {
            max-width: 800px;
            margin: 0 auto;
            background: #000;
            border: 4px solid #00f;
            padding: 20px;
            transform-origin: top;
        }
        
        /* Simple Header */
        .header {
            text-align: center;
            color: #ff0;
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
            padding: 10px;
            background: #00f;
            border: 2px solid #fff;
        }
        
        /* Easy-to-Use Button Grid */
        .button-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        /* Big, Chunky Buttons */
        .mode7-btn {
            background: #0f0;
            color: #000;
            border: none;
            padding: 20px 10px;
            font-family: 'MODE7GX3', 'Courier New', monospace;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: all 0.2s;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .mode7-btn:hover {
            background: #ff0;
            transform: scale(1.05);
        }
        
        .mode7-btn:active {
            background: #f00;
            color: #fff;
        }
        
        /* Button Color Variations */
        .btn-blue { background: #00f; color: #fff; }
        .btn-red { background: #f00; color: #fff; }
        .btn-magenta { background: #f0f; color: #fff; }
        .btn-cyan { background: #0ff; color: #000; }
        .btn-yellow { background: #ff0; color: #000; }
        
        /* Terminal Area */
        .terminal {
            background: #000;
            border: 2px solid #fff;
            padding: 15px;
            margin: 20px 0;
            min-height: 200px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'MODE7GX3', 'Courier New', monospace;
            font-size: 16px;
            line-height: 1.2;
        }
        
        .terminal::-webkit-scrollbar {
            width: 12px;
        }
        
        .terminal::-webkit-scrollbar-track {
            background: #000;
        }
        
        .terminal::-webkit-scrollbar-thumb {
            background: #fff;
            border: 1px solid #000;
        }
        
        /* Command Input */
        .command-input {
            width: 100%;
            background: #000;
            color: #0f0;
            border: 2px solid #0f0;
            padding: 10px;
            font-family: 'MODE7GX3', 'Courier New', monospace;
            font-size: 18px;
            margin-top: 10px;
        }
        
        .command-input:focus {
            outline: none;
            border-color: #ff0;
            color: #ff0;
        }
        
        /* Quick Commands Row */
        .quick-commands {
            display: flex;
            gap: 10px;
            margin: 15px 0;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            background: #888;
            color: #fff;
            border: none;
            padding: 8px 15px;
            font-family: 'MODE7GX3', 'Courier New', monospace;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #fff;
        }
        
        .quick-btn:hover {
            background: #fff;
            color: #000;
        }
        
        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            background: #00f;
            color: #fff;
            padding: 8px 15px;
            margin-top: 20px;
            font-size: 14px;
        }
        
        /* Color Classes for Terminal Output */
        .green { color: #0f0; }
        .red { color: #f00; }
        .yellow { color: #ff0; }
        .blue { color: #00f; }
        .cyan { color: #0ff; }
        .magenta { color: #f0f; }
        .white { color: #fff; }
        
        /* Flash Animation */
        .flash {
            animation: flash 1s infinite;
        }
        
        @keyframes flash {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="mode7-interface">
        <!-- Header -->
        <div class="header">
            <div class="flash">uDOS v1.3 - BBC MODE 7</div>
            <div style="font-size: 16px;">Universal Development Operating System</div>
        </div>
        
        <!-- Main Module Buttons -->
        <div class="button-grid">
            <button class="mode7-btn" onclick="openModule('uCORE')">
                ▌ uCORE ▐<br>
                System Core
            </button>
            
            <button class="mode7-btn btn-blue" onclick="openModule('uSCRIPT')">
                ▌ uSCRIPT ▐<br>
                Automation
            </button>
            
            <button class="mode7-btn btn-magenta" onclick="openModule('uSERVER')">
                ▌ uSERVER ▐<br>
                Web Services
            </button>
            
            <button class="mode7-btn btn-cyan" onclick="openMode('wizard')">
                ▌ WIZARD ▐<br>
                Development
            </button>
            
            <button class="mode7-btn btn-red" onclick="openMode('sorcerer')">
                ▌ SORCERER ▐<br>
                Admin Tools
            </button>
            
            <button class="mode7-btn btn-yellow" onclick="openMode('imp')">
                ▌ IMP ▐<br>
                Scripting
            </button>
        </div>
        
        <!-- Quick Commands -->
        <div class="quick-commands">
            <button class="quick-btn" onclick="quickCmd('help')">HELP</button>
            <button class="quick-btn" onclick="quickCmd('tree')">TREE</button>
            <button class="quick-btn" onclick="quickCmd('memory')">MEMORY</button>
            <button class="quick-btn" onclick="quickCmd('dashboard')">DASHBOARD</button>
            <button class="quick-btn" onclick="quickCmd('templates')">TEMPLATES</button>
            <button class="quick-btn" onclick="quickCmd('clear')">CLEAR</button>
        </div>
        
        <!-- Terminal Output -->
        <div class="terminal" id="terminal">
            <div class="green">READY</div>
            <div class="yellow">uDOS BBC Mode 7 Interface Loaded</div>
            <div class="cyan">Type commands or click buttons</div>
            <div class="white">═══════════════════════════</div>
        </div>
        
        <!-- Command Input -->
        <input type="text" id="command-input" class="command-input" 
               placeholder="Enter command..." 
               autocomplete="off">
        
        <!-- Status Bar -->
        <div class="status-bar">
            <div><span class="green">●</span> READY</div>
            <div id="mode-display">MAIN MODE</div>
            <div id="time-display"></div>
        </div>
    </div>

    <script>
        // Terminal functions
        function log(text, color = 'white') {
            const terminal = document.getElementById('terminal');
            const line = document.createElement('div');
            line.className = color;
            line.textContent = text;
            terminal.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
            
            // Limit terminal history
            if (terminal.children.length > 100) {
                terminal.removeChild(terminal.firstChild);
            }
        }
        
        // Module functions
        function openModule(module) {
            log(`Loading ${module}...`, 'cyan');
            document.getElementById('mode-display').textContent = module;
            
            // Real command execution
            executeCommand(`dashboard ${module.toLowerCase()}`);
        }
        
        function openMode(mode) {
            log(`Switching to ${mode} mode...`, 'yellow');
            document.getElementById('mode-display').textContent = mode.toUpperCase();
            
            // Real command execution
            executeCommand(`mode ${mode}`);
        }
        
        function quickCmd(cmd) {
            log(`> ${cmd}`, 'white');
            executeCommand(cmd);
        }
        
        // Command processor
        function executeCommand(cmd) {
            const command = cmd.toLowerCase().trim();
            
            switch(command) {
                case 'help':
                    showHelp();
                    break;
                case 'clear':
                    document.getElementById('terminal').innerHTML = '';
                    break;
                case 'tree':
                    log('Generating project tree...', 'cyan');
                    log('├── uCORE/', 'green');
                    log('├── uSCRIPT/', 'green');
                    log('├── uSERVER/', 'green');
                    log('├── wizard/', 'blue');
                    log('├── sorcerer/', 'red');
                    log('└── imp/', 'yellow');
                    break;
                case 'memory':
                    log('Memory Status:', 'cyan');
                    log('System: 85% available', 'green');
                    log('Cache: 12MB used', 'white');
                    break;
                case 'dashboard':
                    log('Dashboard modules loaded', 'green');
                    break;
                case 'templates':
                    log('Template system ready', 'magenta');
                    break;
                default:
                    // Try to connect to real uDOS system
                    if (window.udosApp) {
                        window.udosApp.executeCommand(command);
                    } else {
                        log(`Command "${cmd}" not recognized. Type HELP for available commands.`, 'red');
                    }
            }
        }
        
        function showHelp() {
            log('uDOS BBC Mode 7 Commands:', 'yellow');
            log('═══════════════════════════', 'cyan');
            log('HELP     - Show this help', 'white');
            log('CLEAR    - Clear screen', 'white');
            log('TREE     - Show project structure', 'white');
            log('MEMORY   - Show memory status', 'white');
            log('DASHBOARD- Load dashboard', 'white');
            log('TEMPLATES- Template system', 'white');
            log('═══════════════════════════', 'cyan');
        }
        
        // Command input handling
        document.getElementById('command-input').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                const cmd = this.value.trim();
                if (cmd) {
                    log('> ' + cmd, 'white');
                    executeCommand(cmd);
                    this.value = '';
                }
            }
        });
        
        // Time display
        function updateTime() {
            const now = new Date();
            document.getElementById('time-display').textContent = now.toLocaleTimeString();
        }
        
        setInterval(updateTime, 1000);
        updateTime();
        
        // Initialize
        log('System initialized', 'green');
        log('Font: MODE7GX3 with 1:1.3 aspect ratio', 'cyan');
        document.getElementById('command-input').focus();
    </script>
</body>
</html>
